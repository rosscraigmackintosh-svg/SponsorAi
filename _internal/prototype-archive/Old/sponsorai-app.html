<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SponsorAI</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink:#1a1a2e; --blue:#2c6fad; --blue-light:#deeaf6; --blue-mid:#b8d4ee;
  --green:#2a7a50; --green-light:#ddf0e6; --purple:#6b4fa0; --purple-light:#ede8f7;
  --amber:#b87c20; --amber-light:#fdf3e0; --red:#c0392b; --red-light:#fdecea;
  --mid:#3a3a3a; --subtle:#6b6b6b; --rule:#d4d4d4; --pale:#f6f6f6; --panel:#f1f6fb; --white:#ffffff;
}
html { font-size: 14px; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--pale); color: var(--mid); line-height: 1.55; min-height: 100vh; }

/* ── Layout ── */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--rule); position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; display: flex; flex-direction: column; overflow-y: auto; }
.main { margin-left: 220px; flex: 1; min-width: 0; }
.content { padding: 28px 32px 60px; }

/* ── Sidebar ── */
.sidebar-logo-area { padding: 18px 16px 14px; border-bottom: 1px solid var(--rule); flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 8px; text-decoration: none; margin-bottom: 12px; cursor: pointer; }
.logo-mark { font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -0.4px; }
.logo-mark span { color: var(--blue); }
.brand-chip { display: flex; align-items: center; gap: 7px; background: var(--panel); border: 1px solid var(--blue-mid); border-radius: 6px; padding: 7px 10px; font-size: 12px; color: var(--blue); font-weight: 500; width: 100%; cursor: pointer; }
.brand-chip:hover { background: var(--blue-light); }
.brand-chip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
.brand-chip-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px 0; }
.sidebar-section { padding: 0 14px 8px; margin-bottom: 4px; }
.sidebar-lbl { font-size: 10px; font-weight: 600; color: var(--subtle); letter-spacing: 0.7px; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; margin-top: 12px; }
.sidebar-link { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 5px; font-size: 13px; color: var(--mid); text-decoration: none; cursor: pointer; transition: all 0.12s; user-select: none; }
.sidebar-link:hover { background: var(--pale); color: var(--ink); }
.sidebar-link.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
.sidebar-link svg { opacity: 0.65; flex-shrink: 0; }
.sidebar-link.active svg { opacity: 1; }
.sidebar-div { height: 1px; background: var(--rule); margin: 10px 14px; }
.sidebar-count { margin-left: auto; font-size: 11px; background: var(--rule); color: var(--subtle); border-radius: 10px; padding: 1px 7px; }

/* ── Typography ── */
.page-title { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
.page-sub { font-size: 13px; color: var(--subtle); margin-bottom: 24px; }
.sec-title { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 12px; }

/* ── Buttons ── */
.btn { font-size: 12px; padding: 7px 14px; border-radius: 5px; cursor: pointer; border: 1px solid var(--rule); background: var(--white); color: var(--mid); transition: all 0.12s; white-space: nowrap; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.btn:hover { background: var(--pale); border-color: var(--blue-mid); color: var(--ink); }
.btn-primary { background: var(--blue); color: var(--white) !important; border-color: var(--blue); }
.btn-primary:hover { background: #235a8e; border-color: #235a8e; }
.btn-sm { font-size: 11px; padding: 5px 10px; }
.btn-danger { color: var(--red) !important; border-color: var(--red-light); }
.btn-danger:hover { background: var(--red-light); }

/* ── Signals ── */
.signal-pill { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
.sig-fan { background: var(--blue-light); color: var(--blue); }
.sig-fit { background: var(--green-light); color: var(--green); }
.sig-bud { background: var(--purple-light); color: var(--purple); }
.sig-lbl { font-weight: 400; opacity: 0.75; font-size: 10px; }
.conf-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.conf-h { background: var(--green); }
.conf-m { background: var(--amber); }
.conf-l { background: var(--red); }
.conf-row { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--subtle); }

/* ── Cards ── */
.card { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 16px; }
.card-hover { cursor: pointer; transition: all 0.15s; }
.card-hover:hover { border-color: var(--blue-mid); box-shadow: 0 2px 10px rgba(44,111,173,0.07); }
.card-selected { border-color: var(--blue) !important; background: var(--panel) !important; }

/* ── Property Avatar ── */
.prop-av { border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; background: var(--panel); color: var(--blue); border: 1px solid var(--blue-mid); flex-shrink: 0; }
.prop-av-sm { width: 36px; height: 36px; font-size: 11px; }
.prop-av-md { width: 44px; height: 44px; font-size: 13px; }
.prop-av-lg { width: 56px; height: 56px; font-size: 17px; }
.prop-name { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.3; }
.prop-type { font-size: 11px; color: var(--subtle); margin-top: 1px; }
.prop-series { font-size: 11px; color: var(--subtle); }

/* ── Dim bars ── */
.dim-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
.dim-lbl { font-size: 11.5px; color: var(--mid); flex-shrink: 0; }
.dim-bar-wrap { flex: 1; height: 5px; background: var(--rule); border-radius: 3px; overflow: hidden; }
.dim-bar { height: 100%; border-radius: 3px; background: var(--green); }
.dim-val { font-size: 11px; font-weight: 500; color: var(--mid); width: 26px; text-align: right; }

/* ── Signal cards (focus/property) ── */
.sig-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 18px; }
.sig-card { border-radius: 7px; padding: 13px 14px; border: 1px solid transparent; }
.sig-card-fan { background: var(--blue-light); border-color: var(--blue-mid); }
.sig-card-fit { background: var(--green-light); border-color: #b0d9c2; }
.sig-card-bud { background: var(--purple-light); border-color: #c9bce8; }
.sig-card-type { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
.sig-card-fan .sig-card-type { color: var(--blue); }
.sig-card-fit .sig-card-type { color: var(--green); }
.sig-card-bud .sig-card-type { color: var(--purple); }
.sig-card-val { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
.sig-card-fan .sig-card-val { color: var(--blue); }
.sig-card-fit .sig-card-val { color: var(--green); }
.sig-card-bud .sig-card-val { color: var(--purple); }
.sig-card-sub { font-size: 11px; color: var(--subtle); }
.sig-card-note { font-size: 10.5px; color: var(--subtle); margin-top: 5px; font-style: italic; }

/* ── Opp panel ── */
.opp-panel { background: var(--purple-light); border: 1px solid #c9bce8; border-radius: 7px; padding: 12px 14px; }
.opp-tag { font-size: 10px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--purple); background: var(--white); border: 1px solid #c9bce8; border-radius: 4px; padding: 2px 7px; display: inline-block; margin-bottom: 6px; }
.opp-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.opp-meta { font-size: 12px; color: var(--subtle); margin-top: 2px; }

/* ── Callout ── */
.callout { border-left: 3px solid var(--blue); background: var(--panel); border-radius: 0 6px 6px 0; padding: 10px 14px; font-size: 12px; color: var(--mid); }
.callout-warn { border-left-color: var(--amber); background: var(--amber-light); }

/* ── Explore specific ── */
.brand-bar { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 14px 18px; margin-bottom: 22px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
.brand-bar-name { font-size: 14px; font-weight: 600; color: var(--ink); }
.brand-bar-meta { font-size: 12px; color: var(--subtle); margin-top: 1px; }
.profile-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.profile-tag { font-size: 11px; padding: 3px 9px; border-radius: 12px; background: var(--panel); color: var(--blue); border: 1px solid var(--blue-mid); }
.sig-legend { display: flex; gap: 18px; align-items: center; padding: 9px 14px; background: var(--white); border: 1px solid var(--rule); border-radius: 6px; margin-bottom: 22px; flex-wrap: wrap; font-size: 11.5px; color: var(--mid); }
.sig-legend-title { font-size: 10px; font-weight: 600; color: var(--subtle); letter-spacing: 0.4px; text-transform: uppercase; }
.leg-swatch { width: 10px; height: 10px; border-radius: 2px; display: inline-block; }
.leg-item { display: flex; align-items: center; gap: 5px; }
.leg-sep { width: 1px; height: 14px; background: var(--rule); }
.explore-row { margin-bottom: 34px; }
.row-hdr { display: flex; align-items: baseline; gap: 10px; margin-bottom: 11px; }
.row-title { font-size: 14px; font-weight: 600; color: var(--ink); }
.row-desc { font-size: 12px; color: var(--subtle); }
.row-logic { margin-left: auto; font-size: 11px; color: var(--subtle); background: var(--pale); border: 1px solid var(--rule); border-radius: 10px; padding: 2px 9px; white-space: nowrap; flex-shrink: 0; }
.row-cards { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 6px; }
.row-cards::-webkit-scrollbar { height: 4px; }
.row-cards::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
.prop-card { flex: 0 0 225px; background: var(--white); border: 1.5px solid var(--rule); border-radius: 8px; padding: 14px; cursor: pointer; transition: all 0.15s; }
.prop-card:hover { border-color: var(--blue-mid); box-shadow: 0 2px 10px rgba(44,111,173,0.08); }
.prop-card.active { border-color: var(--blue); background: var(--panel); }
.prop-card-hdr { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.prop-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.prop-series-sm { font-size: 11px; color: var(--subtle); border-top: 1px solid var(--rule); padding-top: 7px; margin-top: 4px; }
.card-link { display: block; font-size: 11px; color: var(--blue); margin-top: 7px; opacity: 0; transition: opacity 0.12s; text-decoration: none; }
.prop-card:hover .card-link { opacity: 1; }
.focus-panel { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 22px 24px; margin-bottom: 34px; }
.focus-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; color: var(--subtle); margin-bottom: 12px; }
.focus-hdr { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 18px; }
.focus-actions { margin-left: auto; display: flex; gap: 8px; }
.focus-conf { display: flex; align-items: center; gap: 8px; padding: 9px 14px; background: var(--pale); border: 1px solid var(--rule); border-radius: 6px; margin-bottom: 14px; font-size: 12px; }
.focus-conf .conf-dot { width: 8px; height: 8px; }
.focus-conf-lbl { font-weight: 600; color: var(--ink); }

/* ── Browse specific ── */
.filter-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-bar input, .filter-bar select { font-size: 12px; padding: 7px 10px; border: 1px solid var(--rule); border-radius: 5px; background: var(--white); color: var(--mid); outline: none; }
.filter-bar input:focus, .filter-bar select:focus { border-color: var(--blue-mid); }
.filter-bar input { min-width: 200px; flex: 1; }
.prop-count { font-size: 12px; color: var(--subtle); margin-left: auto; }
.browse-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.browse-card { background: var(--white); border: 1.5px solid var(--rule); border-radius: 8px; padding: 14px; transition: all 0.15s; cursor: pointer; }
.browse-card:hover { border-color: var(--blue-mid); box-shadow: 0 2px 8px rgba(44,111,173,0.07); }
.browse-card-hdr { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
.browse-card-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
.browse-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--rule); }

/* ── Watchlist specific ── */
.wl-list { display: flex; flex-direction: column; gap: 10px; }
.wl-row { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 14px 18px; display: flex; align-items: center; gap: 16px; }
.wl-row:hover { border-color: var(--blue-mid); }
.wl-info { flex: 1; min-width: 0; }
.wl-meta { font-size: 11px; color: var(--subtle); margin-top: 2px; }
.wl-pills { display: flex; gap: 6px; margin-top: 6px; }
.wl-actions { display: flex; gap: 6px; flex-shrink: 0; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--subtle); }
.empty-state-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
.empty-state-title { font-size: 15px; font-weight: 600; color: var(--mid); margin-bottom: 6px; }

/* ── Compare specific ── */
.compare-selectors { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
.compare-selectors select { font-size: 13px; padding: 8px 12px; border: 1px solid var(--rule); border-radius: 6px; background: var(--white); color: var(--ink); font-weight: 500; flex: 1; outline: none; }
.compare-selectors select:focus { border-color: var(--blue-mid); }
.compare-vs { font-size: 12px; color: var(--subtle); font-weight: 500; }
.cmp-table { width: 100%; border-collapse: collapse; background: var(--white); border: 1px solid var(--rule); border-radius: 8px; overflow: hidden; font-size: 12.5px; }
.cmp-table th { background: var(--panel); font-size: 13px; font-weight: 600; color: var(--ink); padding: 14px 18px; text-align: left; border-bottom: 1px solid var(--rule); }
.cmp-table td { padding: 12px 18px; border-bottom: 1px solid var(--rule); vertical-align: middle; }
.cmp-table tr:last-child td { border-bottom: none; }
.cmp-table .row-lbl { font-size: 11.5px; font-weight: 500; color: var(--subtle); background: var(--pale); width: 160px; }
.cmp-table .row-lbl span { display: block; font-size: 11px; font-weight: 400; color: #aaa; margin-top: 2px; }
.cmp-note { font-size: 11.5px; color: var(--subtle); margin-top: 14px; font-style: italic; text-align: center; }

/* ── Portfolio specific ── */
.port-cards { display: flex; flex-direction: column; gap: 18px; }
.port-card { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 20px 22px; }
.port-card-hdr { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 16px; }
.port-card-meta { flex: 1; }
.port-card-actions { display: flex; gap: 8px; }
.port-status { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; color: var(--green); background: var(--green-light); border: 1px solid #b0d9c2; border-radius: 12px; padding: 3px 10px; margin-top: 4px; }
.port-status-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--green); }
.dims-section { margin-bottom: 14px; }
.dims-title { font-size: 11.5px; font-weight: 600; color: var(--mid); margin-bottom: 9px; }

/* ── Opportunities specific ── */
.opp-filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
.opp-filter-bar select { font-size: 12px; padding: 7px 10px; border: 1px solid var(--rule); border-radius: 5px; background: var(--white); color: var(--mid); outline: none; }
.opp-filter-bar select:focus { border-color: var(--blue-mid); }
.opp-list { display: flex; flex-direction: column; gap: 10px; }
.opp-row { background: var(--white); border: 1.5px solid var(--rule); border-radius: 8px; padding: 14px 18px; display: flex; align-items: center; gap: 16px; }
.opp-row.budget-match { border-left: 3px solid var(--green); }
.opp-row:hover { border-color: var(--blue-mid); }
.opp-row.budget-match:hover { border-left-color: var(--green); border-color: var(--blue-mid); }
.opp-prop { display: flex; align-items: center; gap: 10px; flex: 0 0 180px; }
.opp-body { flex: 1; min-width: 0; }
.opp-row-title { font-size: 13px; font-weight: 600; color: var(--ink); }
.opp-row-meta { font-size: 11.5px; color: var(--subtle); margin-top: 2px; }
.opp-signals { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
.opp-actions { display: flex; gap: 6px; flex-shrink: 0; }
.budget-badge { font-size: 10px; font-weight: 600; color: var(--green); background: var(--green-light); border: 1px solid #b0d9c2; border-radius: 4px; padding: 2px 6px; }
.opp-footer-note { font-size: 11px; color: var(--subtle); font-style: italic; margin-top: 16px; text-align: center; }

/* ── Property page specific ── */
.prop-page-hdr { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 22px 24px; margin-bottom: 20px; }
.prop-page-hdr-inner { display: flex; align-items: flex-start; gap: 18px; }
.prop-page-meta { flex: 1; }
.prop-page-name { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 2px; }
.prop-page-type { font-size: 13px; color: var(--subtle); }
.prop-page-series { font-size: 12px; color: var(--blue); margin-top: 3px; }
.prop-page-actions { display: flex; gap: 8px; margin-top: 14px; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 20px; }
.full-col { margin-bottom: 20px; }
.social-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.social-stat { background: var(--white); border: 1px solid var(--rule); border-radius: 7px; padding: 14px; text-align: center; }
.social-stat-val { font-size: 20px; font-weight: 700; color: var(--ink); }
.social-stat-lbl { font-size: 11px; color: var(--subtle); margin-top: 3px; }
.social-platform { font-size: 10px; font-weight: 600; color: var(--blue); margin-bottom: 4px; letter-spacing: 0.3px; text-transform: uppercase; }
.related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.related-card { background: var(--white); border: 1px solid var(--rule); border-radius: 7px; padding: 13px; cursor: pointer; transition: all 0.12s; }
.related-card:hover { border-color: var(--blue-mid); }
.related-card-hdr { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.breadcrumb { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--subtle); margin-bottom: 18px; }
.breadcrumb a { color: var(--blue); text-decoration: none; cursor: pointer; }
.breadcrumb a:hover { text-decoration: underline; }
.breadcrumb-sep { opacity: 0.4; }
</style>
</head>
<body>
<div class="app">

<!-- ── Sidebar ── -->
<aside class="sidebar">
  <div class="sidebar-logo-area">
    <div class="logo" onclick="nav('explore')">
      <span class="logo-mark">Sponsor<span>AI</span></span>
    </div>
    <div class="brand-chip">
      <span class="brand-chip-dot"></span>
      <span class="brand-chip-name">Apex Performance Gear</span>
    </div>
  </div>
  <div class="sidebar-nav">
    <div class="sidebar-section">
      <div class="sidebar-lbl">Discover</div>
      <div class="sidebar-link" data-page="explore" onclick="nav('explore')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>
        Explore
      </div>
      <div class="sidebar-link" data-page="browse" onclick="nav('browse')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="14" height="2" rx="1" fill="currentColor" opacity=".5"/><rect x="1" y="11" width="10" height="2" rx="1" fill="currentColor" opacity=".3"/></svg>
        Browse All
      </div>
      <div class="sidebar-link" data-page="watchlist" onclick="nav('watchlist')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1.5l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.1l-3.8 2.2.7-4.3-3.1-3 4.3-.6L8 1.5z" fill="currentColor" opacity=".5"/></svg>
        Watchlist <span class="sidebar-count" id="wl-count">4</span>
      </div>
      <div class="sidebar-link" data-page="compare" onclick="nav('compare')">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="6" height="9" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="1" width="6" height="12" rx="1.5" fill="currentColor"/></svg>
        Compare
      </div>
    </div>
    <div class="sidebar-div"></div>
    <div class="sidebar-section">

// ── State ─────────────────────────────────────────────────────────────────
let currentPage = 'explore';
let exploreSelected = 1;
let compareId1 = 1, compareId2 = 3;
let watchlistIds = new Set(properties.filter(p=>p.watchlist).map(p=>p.id));
let prevPage = null;

// ── Helpers ───────────────────────────────────────────────────────────────
const confLabel = {h:"High confidence",m:"Moderate confidence",l:"Limited coverage"};
const confClass = {h:"conf-h",m:"conf-m",l:"conf-l"};

function P(id) { return properties.find(p => p.id === id); }

function signalPills(p, showBudget=true) {
  let h = `<span class="signal-pill sig-fan"><span class="sig-lbl">Fan</span> ${p.fanScore}</span>`;
  h += `<span class="signal-pill sig-fit"><span class="sig-lbl">Fit</span> ${p.fitScore}</span>`;
  if (showBudget && p.budgetNum > 0) h += `<span class="signal-pill sig-bud"><span class="sig-lbl">£</span> ${p.budget}</span>`;
  return h;
}

function confRowHtml(p, large=false) {
  const sz = large ? 'style="width:9px;height:9px"' : '';
  return `<div class="conf-row"><span class="conf-dot ${confClass[p.conf]}" ${sz}></span> <strong>${confLabel[p.conf]}</strong> — ${p.confDesc}</div>`;
}

function dimBarsHtml(p, labelWidth='130px') {
  return DIM_LABELS.map((l,i) =>
    `<div class="dim-row"><span class="dim-lbl" style="width:${labelWidth}">${l}</span><div class="dim-bar-wrap"><div class="dim-bar" style="width:${p.dims[i]}%"></div></div><span class="dim-val">${p.dims[i]}</span></div>`
  ).join('');
}

function sigCardsHtml(p) {
  return `<div class="sig-cards">
    <div class="sig-card sig-card-fan">
      <div class="sig-card-type">FanScore</div>
      <div class="sig-card-val">${p.fanScore}</div>
      <div class="sig-card-sub">${p.fanTier} · Multi-platform</div>
      <div class="sig-card-note">${p.fanNote}</div>
    </div>
    <div class="sig-card sig-card-fit">
      <div class="sig-card-type">FitScore — your profile</div>
      <div class="sig-card-val">${p.fitScore}</div>
      <div class="sig-card-sub">${p.fitSub}</div>
      <div class="sig-card-note">${p.fitNote}</div>
    </div>
    <div class="sig-card sig-card-bud">
      <div class="sig-card-type">Budget access</div>
      <div class="sig-card-val">${p.budgetNum > 0 ? p.budget : '—'}</div>
      <div class="sig-card-sub">${p.budgetNum > 0 ? 'Minimum entry point' : 'No opportunity declared'}</div>
      <div class="sig-card-note">${p.budgetNum > 0 ? 'Within your declared budget range.' : 'No active declared opportunity on this property.'}</div>
    </div>
  </div>`;
}

function oppPanelHtml(p) {
  if (!p.oppTitle) return '';
  return `<div class="opp-panel"><span class="opp-tag">Active opportunity</span><div class="opp-title">${p.oppTitle}</div><div class="opp-meta">${p.oppMeta}</div></div>`;
}

function propCardHtml(p, selected=false) {
  return `<div class="prop-card ${selected?'active':''}" onclick="exploreSelect(${p.id})">
    <div class="prop-card-hdr">
      <div class="prop-av prop-av-sm">${p.initials}</div>
      <div><div class="prop-name">${p.name}</div><div class="prop-type">${p.type}</div></div>
    </div>
    <div class="prop-pills">${signalPills(p)}</div>
    ${confRowHtml(p)}
    <div class="prop-series-sm">${p.series}</div>
    <span class="card-link" onclick="event.stopPropagation();nav('property',${p.id})">View full profile →</span>
  </div>`;
}

// ── Router ────────────────────────────────────────────────────────────────
function nav(page, param) {
  prevPage = currentPage;
  currentPage = page;
  document.querySelectorAll('.sidebar-link[data-page]').forEach(l => l.classList.remove('active'));
  const link = document.querySelector(`.sidebar-link[data-page="${page}"]`);
  if (link) link.classList.add('active');
  document.getElementById('main-content').innerHTML = renders[page] ? renders[page](param) : '';
  document.getElementById('main-content').scrollTop = 0;
  window.scrollTo(0,0);
  if (inits[page]) inits[page](param);
}

function exploreSelect(id) {
  exploreSelected = id;
  const p = P(id);
  document.getElementById('fx-av').textContent = p.initials;
  document.getElementById('fx-name').textContent = p.name;
  document.getElementById('fx-type').textContent = p.type;
  document.getElementById('fx-series').textContent = p.series;
  document.getElementById('fx-sigcards').innerHTML = sigCardsHtml(p);
  document.getElementById('fx-dims').innerHTML = dimBarsHtml(p);
  document.getElementById('fx-conf').innerHTML = `<span class="conf-dot ${confClass[p.conf]}" style="width:9px;height:9px"></span><span class="focus-conf-lbl">${confLabel[p.conf]}</span><span style="color:var(--subtle);font-size:12px"> — ${p.confDesc}</span>`;
  document.getElementById('fx-opp').innerHTML = oppPanelHtml(p);
  document.querySelectorAll('.prop-card').forEach(c => c.classList.remove('active'));
  document.querySelectorAll(`.prop-card`).forEach(c => {
    if (c.getAttribute('onclick') === `exploreSelect(${id})`) c.classList.add('active');
  });
  // update View button
  const actions = document.querySelector('.focus-actions');
  if (actions) {
    const btns = actions.querySelectorAll('button');
    if (btns[2]) btns[2].setAttribute('onclick', `nav('property',${id})`);
    if (btns[0]) btns[0].setAttribute('onclick', `toggleWatchlist(${id})`);
  }
}

function toggleWatchlist(id) {
  if (watchlistIds.has(id)) watchlistIds.delete(id);
  else watchlistIds.add(id);
  document.getElementById('wl-count').textContent = watchlistIds.size;
}

      <div class="browse-card-footer">
        <span class="prop-series">${p.series}</span>
        <span style="font-size:11px;color:var(--blue)">View profile →</span>
      </div>
    </div>`).join('');
}

function browseFilter() {
  const q = (document.getElementById('br-search').value||'').toLowerCase();
  const series = document.getElementById('br-series').value;
  const tier = document.getElementById('br-tier').value;
  const conf = document.getElementById('br-conf').value;
  const filtered = properties.filter(p => {
    if (q && !p.name.toLowerCase().includes(q) && !p.series.toLowerCase().includes(q) && !p.type.toLowerCase().includes(q)) return false;
    if (series && !p.series.includes(series)) return false;
    if (tier && p.fanTier !== tier) return false;
    if (conf && p.conf !== conf) return false;
    return true;
  });
  document.getElementById('browse-grid').innerHTML = renderBrowseCards(filtered);
  document.getElementById('br-count').textContent = `Showing ${filtered.length} properties`;
}

// ── Watchlist ─────────────────────────────────────────────────────────────
function renderWatchlist() {
  const wlProps = properties.filter(p => watchlistIds.has(p.id));
  return `
    <div class="page-title">Watchlist</div>
    <div class="page-sub">Properties you are tracking. ${wlProps.length} ${wlProps.length===1?'property':'properties'}.</div>
    <div class="wl-list" id="wl-list">
      ${wlProps.length ? wlProps.map(p => wlRowHtml(p)).join('') : emptyState('No properties on your watchlist','Explore properties and add them here to track signals over time.','☆')}
    </div>`;
}

function wlRowHtml(p) {
  return `<div class="wl-row" id="wl-row-${p.id}">
    <div class="prop-av prop-av-sm" style="cursor:pointer" onclick="nav('property',${p.id})">${p.initials}</div>
    <div class="wl-info">
      <div class="prop-name" style="cursor:pointer" onclick="nav('property',${p.id})">${p.name}</div>
      <div class="wl-meta">${p.type} · ${p.series}</div>
      <div class="wl-pills">${signalPills(p)}</div>
    </div>
    ${confRowHtml(p)}
    <div class="wl-actions">
      <button class="btn btn-sm" onclick="nav('property',${p.id})">View</button>
      <button class="btn btn-sm" onclick="nav('compare')">Compare</button>
      <button class="btn btn-sm btn-danger" onclick="wlRemove(${p.id})">Remove</button>
    </div>
  </div>`;
}

function wlRemove(id) {
  watchlistIds.delete(id);
  document.getElementById('wl-count').textContent = watchlistIds.size;
  const row = document.getElementById(`wl-row-${id}`);
  if (row) row.remove();
  const list = document.getElementById('wl-list');
  if (list && !list.children.length) list.innerHTML = emptyState('Your watchlist is empty','Explore properties and add them here to track signals over time.','☆');
}

function emptyState(title, desc, icon='○') {
  return `<div class="empty-state"><div class="empty-state-icon">${icon}</div><div class="empty-state-title">${title}</div><div style="font-size:13px">${desc}</div><button class="btn btn-primary btn-sm" style="margin-top:16px" onclick="nav('explore')">Go to Explore</button></div>`;
}

// ── Compare ───────────────────────────────────────────────────────────────
function renderCompare() {
  const opts = properties.map(p => `<option value="${p.id}" ${p.id===compareId1?'selected':''}>${p.name}</option>`).join('');
  const opts2 = properties.map(p => `<option value="${p.id}" ${p.id===compareId2?'selected':''}>${p.name}</option>`).join('');
  return `
    <div class="page-title">Compare</div>
    <div class="page-sub">Side-by-side signal comparison. Data presented in parallel. No winner declared.</div>
    <div class="compare-selectors">
      <select onchange="updateCompare(1, parseInt(this.value))">${opts}</select>
      <span class="compare-vs">vs</span>
      <select onchange="updateCompare(2, parseInt(this.value))">${opts2}</select>
      <button class="btn btn-sm" style="opacity:0.5;cursor:not-allowed" disabled>+ Add third property</button>
    </div>
    <div id="cmp-table">${renderCmpTable()}</div>
    <div class="cmp-note">Data presented in parallel. No recommendation implied. FitScore is brand-specific to Apex Performance Gear. Signals are independently computed and must not be combined.</div>`;
}

function renderCmpTable() {
  const p1 = P(compareId1), p2 = P(compareId2);
  const rows = [
    ['Property', `<div style="display:flex;align-items:center;gap:8px"><div class="prop-av prop-av-sm" style="cursor:pointer" onclick="nav('property',${p1.id})">${p1.initials}</div><div><div class="prop-name">${p1.name}</div><div class="prop-type">${p1.type}</div></div></div>`, `<div style="display:flex;align-items:center;gap:8px"><div class="prop-av prop-av-sm" style="cursor:pointer" onclick="nav('property',${p2.id})">${p2.initials}</div><div><div class="prop-name">${p2.name}</div><div class="prop-type">${p2.type}</div></div></div>`],
    ['FanScore','<em>Attention signal</em>',`<span class="signal-pill sig-fan">${p1.fanScore}</span>`, `<span class="signal-pill sig-fan">${p2.fanScore}</span>`],
    ['FanScore tier',`${p1.fanTier}`,`${p2.fanTier}`],
    ['FitScore','<em>Your brand profile</em>',`<span class="signal-pill sig-fit">${p1.fitScore}</span>`,`<span class="signal-pill sig-fit">${p2.fitScore}</span>`],
    ['Geographic fit',`${p1.dims[0]}`,`${p2.dims[0]}`],
    ['Category alignment',`${p1.dims[1]}`,`${p2.dims[1]}`],
    ['Audience age match',`${p1.dims[2]}`,`${p2.dims[2]}`],
    ['Budget compatibility',`${p1.dims[3]}`,`${p2.dims[3]}`],
    ['Series reach alignment',`${p1.dims[4]}`,`${p2.dims[4]}`],
    ['Entry budget',p1.budgetNum>0?`<span class="signal-pill sig-bud">${p1.budget}</span>`:'No opp.', p2.budgetNum>0?`<span class="signal-pill sig-bud">${p2.budget}</span>`:'No opp.'],
    ['Data confidence',confRowHtml(p1), confRowHtml(p2)],
    ['Series',p1.series, p2.series],
  ];
  // fix row format — some are 3-col, some were accidentally 4-col
  const dataRows = [
    ['Property', `<div style="display:flex;align-items:center;gap:8px"><div class="prop-av prop-av-sm">${p1.initials}</div><div><div class="prop-name">${p1.name}</div><div class="prop-type">${p1.type}</div></div></div>`, `<div style="display:flex;align-items:center;gap:8px"><div class="prop-av prop-av-sm">${p2.initials}</div><div><div class="prop-name">${p2.name}</div><div class="prop-type">${p2.type}</div></div></div>`],
    ['FanScore', `<span class="signal-pill sig-fan">${p1.fanScore}</span>`, `<span class="signal-pill sig-fan">${p2.fanScore}</span>`],
    ['FanScore tier', p1.fanTier, p2.fanTier],
    ['FitScore', `<span class="signal-pill sig-fit">${p1.fitScore}</span>`, `<span class="signal-pill sig-fit">${p2.fitScore}</span>`],
    ['Geographic fit', p1.dims[0], p2.dims[0]],
    ['Category alignment', p1.dims[1], p2.dims[1]],
    ['Audience age match', p1.dims[2], p2.dims[2]],
    ['Budget compatibility', p1.dims[3], p2.dims[3]],
    ['Series reach alignment', p1.dims[4], p2.dims[4]],
    ['Entry budget', p1.budgetNum>0?`<span class="signal-pill sig-bud">${p1.budget}</span>`:'No opp. declared', p2.budgetNum>0?`<span class="signal-pill sig-bud">${p2.budget}</span>`:'No opp. declared'],
    ['Data confidence', confRowHtml(p1), confRowHtml(p2)],
    ['Series', p1.series, p2.series],
  ];
  return `<table class="cmp-table">
    <thead><tr>
      <th class="row-lbl" style="width:160px"></th>
      <th><span style="cursor:pointer;color:var(--blue)" onclick="nav('property',${p1.id})">${p1.name} ↗</span></th>
      <th><span style="cursor:pointer;color:var(--blue)" onclick="nav('property',${p2.id})">${p2.name} ↗</span></th>
    </tr></thead>
    <tbody>${dataRows.map(r=>`<tr><td class="row-lbl">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td></tr>`).join('')}</tbody>
  </table>`;
}

function updateCompare(slot, id) {
  if (slot===1) compareId1=id; else compareId2=id;
  document.getElementById('cmp-table').innerHTML = renderCmpTable();
}

// ── Portfolio ─────────────────────────────────────────────────────────────
function renderPortfolio() {
  const portProps = properties.filter(p => p.portfolio);
  return `
    <div class="page-title">Portfolio</div>
    <div class="page-sub">Active evaluation set. ${portProps.length} properties.</div>
    <div class="callout" style="margin-bottom:20px">Portfolio tracks properties under active evaluation. Adding a property here does not indicate commercial intent or constitute a recommendation.</div>
    <div class="port-cards">
      ${portProps.map(p => `
      <div class="port-card" id="port-card-${p.id}">
        <div class="port-card-hdr">
          <div class="prop-av prop-av-lg" style="cursor:pointer" onclick="nav('property',${p.id})">${p.initials}</div>
          <div class="port-card-meta">
            <div style="font-size:16px;font-weight:700;color:var(--ink);cursor:pointer" onclick="nav('property',${p.id})">${p.name}</div>
            <div style="font-size:12px;color:var(--subtle);margin-top:1px">${p.type}</div>
            <div style="font-size:12px;color:var(--blue);margin-top:2px">${p.series}</div>
            <div class="port-status"><span class="port-status-dot"></span>Active evaluation</div>
          </div>
          <div class="port-card-actions">
            <button class="btn btn-sm" onclick="nav('property',${p.id})">View full profile</button>
            <button class="btn btn-sm btn-danger" onclick="portRemove(${p.id})">Remove</button>
          </div>
        </div>
        ${sigCardsHtml(p)}
        <div class="dims-section">
          <div class="dims-title">FitScore dimensions — Apex Performance Gear</div>
          ${dimBarsHtml(p)}
        </div>
        ${confRowHtml(p, true)}
        ${p.oppTitle ? `<div style="margin-top:14px">${oppPanelHtml(p)}</div>` : ''}
      </div>`).join('')}
    </div>`;
}

function portRemove(id) {
  const card = document.getElementById(`port-card-${id}`);
  if (card) { card.style.opacity='0.4'; card.style.pointerEvents='none'; card.querySelector('.port-status').innerHTML='<span style="color:var(--subtle)">Removed from portfolio</span>'; }
}

// ── Opportunities ─────────────────────────────────────────────────────────
function renderOpportunities() {
  return `
    <div class="page-title">Opportunities</div>
    <div class="page-sub">Declared sponsorship openings. Filtered to your declared budget range of £80k–£150k.</div>
    <div class="opp-filter-bar">
      <select id="opp-budget" onchange="oppFilter()">
        <option value="">All budgets</option>
        <option value="under50">Under £50k</option>
        <option value="50to100">£50k – £100k</option>
        <option value="over100">Over £100k</option>
      </select>
      <select id="opp-fit" onchange="oppFilter()">
        <option value="">All FitScores</option>
        <option value="70">Strong alignment (70+)</option>
        <option value="60">Good alignment (60–69)</option>
        <option value="50">Moderate (50–59)</option>
      </select>
      <select id="opp-sort" onchange="oppFilter()">
        <option value="fit">FitScore ↓</option>
        <option value="budget">Budget ↑</option>
      </select>
      <span class="prop-count" id="opp-count"></span>
    </div>
    <div class="opp-list" id="opp-list"></div>
    <div class="opp-footer-note">Opportunities are property-declared. SponsorAI does not verify terms or guarantee availability. No recommendation is implied.</div>`;
}

function oppFilter() {
  const budgetF = document.getElementById('opp-budget')?.value || '';
  const fitF = parseInt(document.getElementById('opp-fit')?.value||0);
  const sortF = document.getElementById('opp-sort')?.value || 'fit';
  let opps = properties.filter(p => p.oppTitle);
  if (budgetF==='under50') opps = opps.filter(p=>p.budgetNum>0&&p.budgetNum<50);
  else if (budgetF==='50to100') opps = opps.filter(p=>p.budgetNum>=50&&p.budgetNum<=100);
  else if (budgetF==='over100') opps = opps.filter(p=>p.budgetNum>100);
  if (fitF) opps = opps.filter(p=>p.fitScore>=fitF);
  if (sortF==='fit') opps.sort((a,b)=>b.fitScore-a.fitScore);
  else opps.sort((a,b)=>a.budgetNum-b.budgetNum);
  const inBudget = opps.filter(p=>p.budgetNum>=80&&p.budgetNum<=150).length;
  document.getElementById('opp-count').textContent = `${opps.length} ${opps.length===1?'opportunity':'opportunities'} · ${inBudget} within budget range`;
  document.getElementById('opp-list').innerHTML = opps.map(p => {
    const match = p.budgetNum>=80&&p.budgetNum<=150;
    return `<div class="opp-row ${match?'budget-match':''}">
      <div class="opp-prop" onclick="nav('property',${p.id})" style="cursor:pointer">
        <div class="prop-av prop-av-sm">${p.initials}</div>
        <div><div class="prop-name">${p.name}</div><div class="prop-type">${p.type}</div></div>
      </div>
      <div class="opp-body">
        <div class="opp-row-title">${p.oppTitle}</div>
        <div class="opp-row-meta">${p.oppMeta}</div>
      </div>
      <div class="opp-signals">
        ${match?`<span class="budget-badge">In budget</span>`:''}
        <span class="signal-pill sig-fit"><span class="sig-lbl">Fit</span> ${p.fitScore}</span>
        <span class="signal-pill sig-bud"><span class="sig-lbl">£</span> ${p.budget}</span>
      </div>
      <div class="opp-actions">
        <button class="btn btn-sm" onclick="nav('property',${p.id})">View property</button>
      </div>
    </div>`;
  }).join('') || `<div class="empty-state"><div class="empty-state-title">No opportunities match these filters</div></div>`;
}

// ── Property page ─────────────────────────────────────────────────────────
function renderProperty(id) {
  const pid = parseInt(id) || 1;
  const p = P(pid) || properties[0];
  const related = properties.filter(q => q.id!==pid && q.fanTier===p.fanTier).slice(0,3);
  const ig = Math.round(p.fanScore * 2.1 + 20);
  const tw = Math.round(p.fanScore * 1.4 + 5);
  const yt = Math.round(p.fanScore * 0.6 + 2);
  const eng = (2.1 + (p.fanScore-50)*0.04).toFixed(1);
  const back = prevPage && prevPage!=='property' ? prevPage : 'explore';
  const backLabel = {explore:'Explore', browse:'Browse All', watchlist:'Watchlist', opportunities:'Opportunities', portfolio:'Portfolio', compare:'Compare'}[back]||'Explore';
  return `
    <div class="breadcrumb">
      <span class="card-link" style="opacity:1;font-size:12px;cursor:pointer;color:var(--blue)" onclick="nav('${back}')">← Back to ${backLabel}</span>
    </div>
    <div class="prop-page-hdr">
      <div class="prop-page-hdr-inner">
        <div class="prop-av prop-av-lg">${p.initials}</div>
        <div class="prop-page-meta">
          <div class="prop-page-name">${p.name}</div>
          <div class="prop-page-type">${p.type}</div>
          <div class="prop-page-series">${p.series}</div>
        </div>
      </div>
      <div class="prop-page-actions">
        <button class="btn btn-sm" onclick="toggleWatchlist(${p.id})">+ Watchlist</button>
        <button class="btn btn-sm" onclick="nav('compare')">Compare</button>
        ${p.oppTitle?`<button class="btn btn-sm btn-primary" onclick="nav('opportunities')">View opportunities</button>`:''}
      </div>
    </div>

    ${sigCardsHtml(p)}

    <div class="two-col">
      <div class="card full-col" style="margin-bottom:0">
        <div class="sec-title" style="margin-bottom:14px">FitScore dimensions — Apex Performance Gear</div>
        ${dimBarsHtml(p, '145px')}
        <div style="margin-top:12px">${confRowHtml(p, true)}</div>
      </div>
      <div class="card" style="margin-bottom:0">
        <div class="sec-title" style="margin-bottom:14px">Social signals</div>
        <div class="social-grid" style="grid-template-columns:1fr 1fr;gap:10px">
          <div class="social-stat"><div class="social-platform">Instagram</div><div class="social-stat-val">${ig}k</div><div class="social-stat-lbl">Followers</div></div>
          <div class="social-stat"><div class="social-platform">X / Twitter</div><div class="social-stat-val">${tw}k</div><div class="social-stat-lbl">Followers</div></div>
          <div class="social-stat"><div class="social-platform">YouTube</div><div class="social-stat-val">${yt}k</div><div class="social-stat-lbl">Subscribers</div></div>
          <div class="social-stat"><div class="social-platform">Engagement</div><div class="social-stat-val">${eng}%</div><div class="social-stat-lbl">Avg. rate</div></div>
        </div>
      </div>
    </div>

    ${p.oppTitle ? `<div class="full-col">${oppPanelHtml(p)}</div>` : ''}

    ${related.length ? `<div class="full-col">
      <div class="sec-title">Related properties — same tier</div>
      <div class="related-grid">
        ${related.map(r=>`<div class="related-card" onclick="nav('property',${r.id})">
          <div class="related-card-hdr">
            <div class="prop-av prop-av-sm">${r.initials}</div>
            <div><div class="prop-name">${r.name}</div><div class="prop-type">${r.type}</div></div>
          </div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">${signalPills(r,false)}</div>
          <div style="margin-top:6px">${confRowHtml(r)}</div>
        </div>`).join('')}
      </div>
    </div>` : ''}`;
}

// ── Render map ────────────────────────────────────────────────────────────
const renders = {
  explore: renderExplore,
  browse: renderBrowse,
  watchlist: renderWatchlist,
  compare: renderCompare,
  portfolio: renderPortfolio,
  opportunities: renderOpportunities,
  property: renderProperty,
};

const inits = {
  opportunities: () => oppFilter(),
};

// ── Boot ──────────────────────────────────────────────────────────────────
nav('explore');
</script>
</body>
</html>
