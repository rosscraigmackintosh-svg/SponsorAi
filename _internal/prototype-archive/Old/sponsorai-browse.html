<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse All - SponsorAI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink:#1a1a2e;--blue:#2c6fad;--blue-light:#deeaf6;--blue-mid:#b8d4ee;--green:#2a7a50;--green-light:#ddf0e6;--purple:#6b4fa0;--purple-light:#ede8f7;--amber:#b87c20;--amber-light:#fdf3e0;--red:#c0392b;--red-light:#fdecea;--mid:#3a3a3a;--subtle:#6b6b6b;--rule:#d4d4d4;--pale:#f6f6f6;--panel:#f1f6fb;--white:#ffffff; }
    html { font-size: 14px; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--pale); color: var(--mid); line-height: 1.55; min-height: 100vh; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 220px; flex-shrink: 0; background: var(--white); border-right: 1px solid var(--rule); position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; z-index: 10; display: flex; flex-direction: column; }
    .content { margin-left: 220px; flex: 1; min-width: 0; padding: 28px 32px 60px; }
    .sidebar-logo-area { padding: 18px 16px 14px; border-bottom: 1px solid var(--rule); flex-shrink: 0; }
    .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; margin-bottom: 12px; }
    .logo-mark { font-size: 17px; font-weight: 700; color: var(--ink); letter-spacing: -0.4px; }
    .logo-mark span { color: var(--blue); }
    .brand-chip { display: flex; align-items: center; gap: 7px; background: var(--panel); border: 1px solid var(--blue-mid); border-radius: 6px; padding: 7px 10px; cursor: pointer; font-size: 12px; color: var(--blue); font-weight: 500; width: 100%; }
    .brand-chip:hover { background: var(--blue-light); }
    .brand-chip-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); flex-shrink: 0; }
    .brand-chip-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-nav-scroll { flex: 1; overflow-y: auto; padding: 8px 0; }
    .sidebar-section { padding: 0 14px 8px; margin-bottom: 4px; }
    .sidebar-label { font-size: 10px; font-weight: 600; color: var(--subtle); letter-spacing: 0.7px; text-transform: uppercase; padding: 0 8px; margin-bottom: 6px; margin-top: 12px; }
    .sidebar-link { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 5px; font-size: 13px; color: var(--mid); text-decoration: none; cursor: pointer; transition: all 0.12s; user-select: none; }
    .sidebar-link:hover { background: var(--pale); color: var(--ink); }
    .sidebar-link.active { background: var(--blue-light); color: var(--blue); font-weight: 500; }
    .sidebar-link svg { opacity: 0.65; flex-shrink: 0; }
    .sidebar-link.active svg { opacity: 1; }
    .sidebar-divider { height: 1px; background: var(--rule); margin: 10px 14px; }
    .sidebar-count { margin-left: auto; font-size: 11px; background: var(--rule); color: var(--subtle); border-radius: 10px; padding: 1px 7px; }
    .page-title { font-size: 22px; font-weight: 700; color: var(--ink); margin-bottom: 4px; }
    .page-subtitle { font-size: 13px; color: var(--subtle); margin-bottom: 24px; }
    .btn { font-size: 12px; padding: 7px 14px; border-radius: 5px; cursor: pointer; border: 1px solid var(--rule); background: var(--white); color: var(--mid); transition: all 0.12s; white-space: nowrap; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
    .btn:hover { background: var(--pale); border-color: var(--blue-mid); color: var(--ink); }
    .btn-primary { background: var(--blue); color: var(--white); border-color: var(--blue); }
    .btn-primary:hover { background: #235a8e; border-color: #235a8e; color: var(--white); }
    .signal-pill { font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
    .signal-fan { background: var(--blue-light); color: var(--blue); }
    .signal-fit { background: var(--green-light); color: var(--green); }
    .signal-bud { background: var(--purple-light); color: var(--purple); }
    .signal-label { font-weight: 400; opacity: 0.75; font-size: 10px; }
    .conf-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
    .conf-high { background: #2a7a50; }
    .conf-mod { background: #b87c20; }
    .conf-lim { background: #c0392b; }
    
    .filters-bar { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 16px; margin-bottom: 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
    .filter-group { display: flex; align-items: center; gap: 8px; }
    .filter-label { font-size: 12px; color: var(--subtle); font-weight: 500; }
    .filter-input { font-size: 12px; padding: 6px 10px; border: 1px solid var(--rule); border-radius: 5px; background: var(--white); color: var(--ink); }
    .filter-count { margin-left: auto; font-size: 12px; color: var(--subtle); }
    
    .properties-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .property-card { background: var(--white); border: 1px solid var(--rule); border-radius: 8px; padding: 16px; }
    .property-card-header { display: flex; gap: 12px; margin-bottom: 12px; }
    .property-card-avatar { width: 40px; height: 40px; border-radius: 6px; background: var(--blue-light); color: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
    .property-card-text { flex: 1; }
    .property-card-name { font-size: 13px; font-weight: 600; color: var(--ink); text-decoration: none; cursor: pointer; margin-bottom: 2px; }
    .property-card-name:hover { color: var(--blue); }
    .property-card-type { font-size: 11px; color: var(--subtle); margin-bottom: 4px; }
    .property-card-series { font-size: 11px; color: var(--subtle); }
    .property-card-signals { display: flex; gap: 6px; margin: 12px 0; flex-wrap: wrap; }
    .property-card-confidence { display: flex; gap: 6px; align-items: center; padding-top: 12px; border-top: 1px solid var(--rule); font-size: 11px; color: var(--subtle); }
    .property-card-action { font-size: 11px; color: var(--blue); text-decoration: none; cursor: pointer; margin-top: 12px; display: inline-block; }
    .property-card-action:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-logo-area">
        <a class="logo" href="sponsorai-explore-rebuild.html"><span class="logo-mark">Sponsor<span>AI</span></span></a>
        <div class="brand-chip"><span class="brand-chip-dot"></span><span class="brand-chip-name">Apex Performance Gear</span></div>
      </div>
      <div class="sidebar-nav-scroll">
        <div class="sidebar-section">
          <div class="sidebar-label">Discover</div>
          <a class="sidebar-link" href="sponsorai-explore-rebuild.html">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" fill="currentColor"/><rect x="9" y="1" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="1" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="9" width="6" height="6" rx="1.5" fill="currentColor" opacity=".4"/></svg>
            Explore
          </a>
          <a class="sidebar-link active" href="sponsorai-browse.html">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="3" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="14" height="2" rx="1" fill="currentColor" opacity=".5"/><rect x="1" y="11" width="10" height="2" rx="1" fill="currentColor" opacity=".3"/></svg>
            Browse All
          </a>
          <a class="sidebar-link" href="sponsorai-watchlist.html">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1.5l1.9 3.9 4.3.6-3.1 3 .7 4.3L8 11.1l-3.8 2.2.7-4.3-3.1-3 4.3-.6L8 1.5z" fill="currentColor" opacity=".5"/></svg>
            Watchlist <span class="sidebar-count">4</span>
          </a>
          <a class="sidebar-link" href="sponsorai-compare.html">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="4" width="6" height="9" rx="1.5" fill="currentColor" opacity=".4"/><rect x="9" y="1" width="6" height="12" rx="1.5" fill="currentColor"/></svg>
            Compare
          </a>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-section">
          <div class="sidebar-label">My Work</div>
          <a class="sidebar-link" href="sponsorai-portfolio.html">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M5 8l2 2 4-4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            Portfolio <span class="sidebar-count">2</span>
          </a>
          <a class="sidebar-link" href="sponsorai-opportunities.html">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M5 8h6M8 5v6" stroke="currentColor" stroke-width="1.5"/></svg>
            Opportunities
          </a>
        </div>
        <div class="sidebar-divider"></div>
        <div class="sidebar-section">
          <div class="sidebar-label">Intelligence</div>
          <a class="sidebar-link" href="#"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 12 L5 7 L8 9 L11 4 L14 8" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>Methodology</a>
          <a class="sidebar-link" href="#"><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M8 5v4l2.5 1.5" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>Signal History</a>
        </div>
      </div>
    </aside>

    <div class="content">
      <div class="page-title">Browse All</div>
      <div class="page-subtitle">Complete property universe. No implied ranking.</div>

      <div class="filters-bar">
        <div class="filter-group">
          <input type="text" class="filter-input" id="search-input" placeholder="Search properties...">
        </div>
        <div class="filter-group">
          <label class="filter-label">Series</label>
          <select class="filter-input" id="series-filter">
            <option value="">All series</option>
            <option value="FIA F2">FIA F2</option>
            <option value="FIA F3">FIA F3</option>
            <option value="British GT">British GT</option>
            <option value="FIA WEC">FIA WEC</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label">Tier</label>
          <select class="filter-input" id="tier-filter">
            <option value="">All tiers</option>
            <option value="Tier B">Tier B</option>
            <option value="Tier C">Tier C</option>
          </select>
        </div>
        <div class="filter-group">
          <label class="filter-label">Confidence</label>
          <select class="filter-input" id="confidence-filter">
            <option value="">All</option>
            <option value="high">High</option>
            <option value="mod">Moderate</option>
            <option value="lim">Limited</option>
          </select>
        </div>
        <div class="filter-count" id="count">Showing 10 properties</div>
      </div>

      <div class="properties-grid" id="properties-grid"></div>
    </div>
  </div>

  <script>
    const properties = [
      { id:1, initials:"PR", name:"Prema Racing", type:"F2 & F3 Constructor", series:"FIA F2 · FIA F3 · FR Italian", fanScore:74, fanTier:"Tier B", fitScore:68, fitSub:"Good alignment", budget:"£95k", budgetNum:95, conf:"high", confDesc:"4/4 sources active. Data currency: 3 days.", fanNote:"Strong engagement momentum over 90 days. Audience growth 18% YoY.", fitNote:"Geographic and category match. Audience age skew aligned.", oppTitle:"Race suit & apparel partner — FIA F2 2025", oppMeta:"Minimum £95,000 · Declared 18 days ago · Expires in 43 days", dims:[80,72,65,88,54], watchlist:true, portfolio:true },
      { id:2, initials:"ART", name:"ART Grand Prix", type:"F2 & F3 Constructor", series:"FIA F2 · FIA F3", fanScore:71, fanTier:"Tier B", fitScore:64, fitSub:"Good alignment", budget:"£110k", budgetNum:110, conf:"high", confDesc:"4/4 sources active. Data currency: 5 days.", fanNote:"Consistent engagement across platforms. Large international fanbase.", fitNote:"Category match strong. Geographic fit moderate — French team, European series.", oppTitle:"Technical partner — livery placement", oppMeta:"Minimum £110,000 · Declared 7 days ago", dims:[68,74,70,77,62], watchlist:false, portfolio:false },
      { id:3, initials:"HI", name:"Hitech Grand Prix", type:"F2 & F3 Constructor", series:"FIA F2 · FIA F3", fanScore:62, fanTier:"Tier B", fitScore:71, fitSub:"Strong alignment", budget:"£75k", budgetNum:75, conf:"mod", confDesc:"3/4 sources active. Instagram data partial. Data currency: 9 days.", fanNote:"UK-based team with strong domestic audience. Growing international presence.", fitNote:"Excellent UK geographic fit. Category alignment high. Budget well within range.", oppTitle:"Apparel & accessories partner", oppMeta:"Minimum £75,000 · Declared 12 days ago · Expires in 18 days", dims:[91,78,68,95,49], watchlist:true, portfolio:false },
      { id:4, initials:"TP", name:"Theo Pourchaire", type:"Formula 2 Driver", series:"FIA F2 Championship", fanScore:81, fanTier:"Tier B", fitScore:52, fitSub:"Moderate alignment", budget:"—", budgetNum:0, conf:"high", confDesc:"4/4 sources active. Data currency: 1 day.", fanNote:"Highest FanScore momentum in F2 grid. 90-day growth of +12 points.", fitNote:"Strong FanScore match. Geographic fit lower — French driver, limited UK activation.", oppTitle:null, oppMeta:null, dims:[55,60,72,40,48], watchlist:true, portfolio:false },
      { id:5, initials:"CA", name:"Carlin Motorsport", type:"Multi-Series Constructor", series:"FIA F2 · FIA F3 · British F4", fanScore:69, fanTier:"Tier B", fitScore:66, fitSub:"Good alignment", budget:"£85k", budgetNum:85, conf:"high", confDesc:"4/4 sources active. Data currency: 4 days.", fanNote:"Steady engagement. Multi-series presence amplifies total reach.", fitNote:"UK-based. Strong automotive affinity in existing partner base.", oppTitle:"Multi-series branding package", oppMeta:"Minimum £85,000 · Declared 22 days ago", dims:[84,70,66,90,58], watchlist:true, portfolio:true },
      { id:6, initials:"VR", name:"Virtuosi Racing", type:"F2 Constructor", series:"FIA F2 Championship", fanScore:58, fanTier:"Tier B", fitScore:73, fitSub:"Strong alignment", budget:"£70k", budgetNum:70, conf:"mod", confDesc:"3/4 sources active. TikTok data limited. Data currency: 7 days.", fanNote:"Moderate FanScore. Strong within-tier positioning.", fitNote:"UK team. Category alignment very strong — existing performance automotive adjacency.", oppTitle:"Technical apparel partner", oppMeta:"Minimum £70,000 · Declared 31 days ago · Expires in 9 days", dims:[88,82,62,93,52], watchlist:false, portfolio:false },
      { id:7, initials:"WR", name:"WRT", type:"GT & LMP Constructor", series:"FIA WEC · GTWC Europe", fanScore:67, fanTier:"Tier B", fitScore:59, fitSub:"Moderate alignment", budget:"—", budgetNum:0, conf:"mod", confDesc:"3/4 sources active. YouTube data limited. Data currency: 6 days.", fanNote:"Strong FanScore growth in endurance. +9 points over 90 days.", fitNote:"Belgian team. Geographic fit weaker for UK-focused brand.", oppTitle:null, oppMeta:null, dims:[52,65,58,45,72], watchlist:false, portfolio:false },
      { id:8, initials:"MP", name:"MP Motorsport", type:"F2 & F3 Constructor", series:"FIA F2 · FIA F3 · Euroformula", fanScore:55, fanTier:"Tier C", fitScore:60, fitSub:"Moderate alignment", budget:"£55k", budgetNum:55, conf:"lim", confDesc:"2/4 sources active. Instagram and YouTube data limited.", fanNote:"Limited data coverage. FanScore computed from partial signal set.", fitNote:"Dutch-based team. Geographic fit moderate. Budget entry point accessible.", oppTitle:"Driver kit & apparel partner", oppMeta:"Minimum £55,000 · Declared 44 days ago · Expires in 16 days", dims:[58,62,55,88,40], watchlist:false, portfolio:false },
      { id:9, initials:"DS", name:"DAMS", type:"F2 Constructor", series:"FIA F2 Championship", fanScore:63, fanTier:"Tier B", fitScore:57, fitSub:"Moderate alignment", budget:"—", budgetNum:0, conf:"high", confDesc:"4/4 sources active. Data currency: 2 days.", fanNote:"Steady signals. FanScore stable over 90 days.", fitNote:"French team. Category alignment moderate.", oppTitle:null, oppMeta:null, dims:[50,60,58,42,61], watchlist:false, portfolio:false },
      { id:10, initials:"FO", name:"Fortec Motorsports", type:"F3 & British GT Constructor", series:"FIA F3 · British GT · British F4", fanScore:51, fanTier:"Tier C", fitScore:67, fitSub:"Good alignment", budget:"£45k", budgetNum:45, conf:"mod", confDesc:"3/4 sources active. TikTok not tracked. Data currency: 11 days.", fanNote:"Smaller-scale property. FanScore appropriate to tier. Domestic UK presence strong.", fitNote:"UK team. Excellent geographic fit. Category alignment strong.", oppTitle:"Season livery & apparel partner", oppMeta:"Minimum £45,000 · Declared 8 days ago", dims:[92,75,60,99,43], watchlist:false, portfolio:false },
    ];

    let filtered = [...properties];

    function render() {
      const grid = document.getElementById('properties-grid');
      grid.innerHTML = '';
      filtered.forEach(p => {
        const card = document.createElement('div');
        card.className = 'property-card';
        const confClass = p.conf === 'high' ? 'conf-high' : p.conf === 'mod' ? 'conf-mod' : 'conf-lim';
        const confLabel = p.conf === 'high' ? 'High' : p.conf === 'mod' ? 'Moderate' : 'Limited';
        const budgetPill = p.budget !== '—' ? `<span class="signal-pill signal-bud">${p.budget}</span>` : '';
        card.innerHTML = `
          <div class="property-card-header">
            <div class="property-card-avatar">${p.initials}</div>
            <div class="property-card-text">
              <a href="sponsorai-property.html?id=${p.id}" class="property-card-name">${p.name}</a>
              <div class="property-card-type">${p.type}</div>
              <div class="property-card-series">${p.series}</div>
            </div>
          </div>
          <div class="property-card-signals">
            <span class="signal-pill signal-fan">${p.fanScore} <span class="signal-label">FanScore</span></span>
            <span class="signal-pill signal-fit">${p.fitScore} <span class="signal-label">FitScore</span></span>
            ${budgetPill}
          </div>
          <div class="property-card-confidence">
            <span class="conf-dot ${confClass}"></span>
            <span>${confLabel}</span>
          </div>
          <a href="sponsorai-property.html?id=${p.id}" class="property-card-action">View profile →</a>
        `;
        grid.appendChild(card);
      });
      document.getElementById('count').textContent = `Showing ${filtered.length} properties`;
    }

    function updateFilters() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const series = document.getElementById('series-filter').value;
      const tier = document.getElementById('tier-filter').value;
      const confidence = document.getElementById('confidence-filter').value;

      filtered = properties.filter(p => {
        const matchSearch = !search || p.name.toLowerCase().includes(search) || p.type.toLowerCase().includes(search);
        const matchSeries = !series || p.series.includes(series);
        const matchTier = !tier || p.fanTier === tier;
        const matchConf = !confidence || p.conf === confidence;
        return matchSearch && matchSeries && matchTier && matchConf;
      });
      render();
    }

    document.getElementById('search-input').addEventListener('input', updateFilters);
    document.getElementById('series-filter').addEventListener('change', updateFilters);
    document.getElementById('tier-filter').addEventListener('change', updateFilters);
    document.getElementById('confidence-filter').addEventListener('change', updateFilters);

    render();
  </script>
</body>
</html>
