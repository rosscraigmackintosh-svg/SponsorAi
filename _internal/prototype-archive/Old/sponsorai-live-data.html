<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SponsorAI - Explore</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ── */
:root {
  --bg:#f9f9f8; --surface:#ffffff; --surface-alt:#f5f5f3;
  --border:#e8e8e4; --border-strong:#d0d0ca;
  --text-1:#0f0f0e; --text-2:#5c5c58; --text-3:#9c9c96;
  --accent:#e8521a; --accent-s:#fdf1eb; --accent-m:#f5c4ac;
  --green:#1a8a4a; --green-s:#edf7f2; --green-m:#a8d9bc;
  --blue:#1a5ce8; --blue-s:#edf2fd; --blue-m:#b3c9f8;
  --purple:#6b5bd6; --purple-s:#f0effe; --purple-m:#c4bcf0;
  --amber:#b87010; --amber-s:#fdf6eb; --amber-m:#f0cc8a;
  --red:#c0392b; --red-s:#fdecea; --red-m:#f5b3ac;
  --font:'DM Sans',system-ui,sans-serif;
  --mono:'DM Mono','SF Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg);color:var(--text-1);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}

/* ── LAYOUT ── */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);position:fixed;top:0;left:0;bottom:0;z-index:20;display:flex;flex-direction:column;overflow-y:auto}
.main{margin-left:220px;flex:1;min-width:0;display:flex;flex-direction:column}
.content{padding:24px 30px 60px;flex:1}

/* ── SIDEBAR ── */
.sb-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border)}
.logo-mark{font-size:15px;font-weight:700;color:var(--text-1);letter-spacing:-0.3px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.logo-mark b{color:var(--accent)}
.logo-icon{width:22px;height:22px;background:var(--accent);border-radius:6px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-chip{margin-top:10px;display:flex;align-items:center;gap:7px;background:var(--surface-alt);border:1px solid var(--border);border-radius:6px;padding:7px 10px;font-size:12px;color:var(--text-2);cursor:pointer;transition:all .1s}
.brand-chip:hover{background:var(--accent-s);border-color:var(--accent-m)}
.brand-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0}
.brand-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.sb-nav{flex:1;padding:6px 0}
.nav-lbl{font-size:10px;font-weight:600;color:var(--text-3);letter-spacing:0.6px;text-transform:uppercase;padding:12px 20px 4px}
.nav-link{display:flex;align-items:center;gap:9px;padding:7px 12px;margin:0 6px;border-radius:6px;font-size:13px;color:var(--text-2);cursor:pointer;transition:all .1s}
.nav-link:hover{background:var(--surface-alt);color:var(--text-1)}
.nav-link.active{background:var(--accent-s);color:var(--accent);font-weight:500}
.nav-link svg{opacity:.55;flex-shrink:0}
.nav-link.active svg{opacity:1}
.nav-badge{margin-left:auto;font-size:10.5px;background:var(--surface-alt);color:var(--text-3);border-radius:10px;padding:1px 7px;border:1px solid var(--border)}
.sb-footer{border-top:1px solid var(--border);padding:10px 12px}
.model-stamp{display:flex;align-items:center;gap:6px;padding:5px 8px;font-size:11px;color:var(--text-3)}

/* ── TOPBAR ── */
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 30px;display:flex;align-items:center;gap:14px;flex-shrink:0}
.tb-heading{flex:1}
.tb-title{font-size:17px;font-weight:600;color:var(--text-1)}
.tb-meta{font-size:11.5px;color:var(--text-3);margin-top:1px}
.filter-pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:11.5px;background:var(--surface-alt);border:1px solid var(--border);border-radius:20px;padding:4px 13px;color:var(--text-2);cursor:pointer;transition:all .1s}
.pill:hover{background:var(--accent-s);border-color:var(--accent-m);color:var(--accent)}
.pill.active{background:var(--accent-s);border-color:var(--accent-m);color:var(--accent);font-weight:500}

/* ── FOCUS PANEL ── */
.focus-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 22px;margin-bottom:28px}
.focus-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-3);margin-bottom:14px;display:flex;align-items:center;gap:7px}
.focus-lbl-dot{width:5px;height:5px;border-radius:50%;background:var(--accent)}
.focus-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.prop-av{border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.av-md{width:48px;height:48px;font-size:15px}
.focus-info{flex:1;min-width:0}
.focus-name{font-size:17px;font-weight:600;color:var(--text-1);line-height:1.25;letter-spacing:-0.2px}
.focus-sub{font-size:12px;color:var(--text-3);margin-top:3px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.type-badge{font-size:10px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;padding:2px 7px;border-radius:4px;border:1px solid;display:inline-flex}
.focus-actions{display:flex;gap:7px;flex-shrink:0}
.btn{font-size:12px;padding:6px 13px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;transition:all .1s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--surface-alt);border-color:var(--border-strong)}
.btn-primary{background:var(--accent);color:#fff!important;border-color:var(--accent)}
.btn-primary:hover{background:#cf4715;border-color:#cf4715}
.btn-sm{font-size:11px;padding:4px 10px}

/* ── SCORE WINDOWS ── */
.score-windows{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.score-win{background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.score-win.primary{background:var(--accent-s);border-color:var(--accent-m)}
.sw-lbl{font-size:10px;font-weight:600;letter-spacing:0.4px;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}
.score-win.primary .sw-lbl{color:#b04010}
.sw-val{font-size:28px;font-weight:600;color:var(--text-1);line-height:1;font-family:var(--mono);letter-spacing:-0.5px}
.score-win.primary .sw-val{color:var(--accent)}
.sw-meta{font-size:11px;color:var(--text-3);margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.trend-up{color:var(--green);font-weight:500}
.trend-dn{color:#b34030;font-weight:500}
.trend-neu{color:var(--text-3)}
.conf-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0}
.conf-h{background:var(--green)}
.conf-m{background:var(--amber)}
.conf-l{background:var(--red)}

/* ── CHART ── */
.chart-section{margin-bottom:18px}
.chart-lbl{font-size:11px;color:var(--text-3);margin-bottom:7px;display:flex;align-items:center;gap:8px}
.chart-lbl b{color:var(--text-2);font-weight:500}
.chart-wrap{background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:12px 14px 10px}
.chart-axis{display:flex;justify-content:space-between;margin-top:5px;font-size:10px;color:var(--text-3);font-family:var(--mono)}
.chart-axis span{flex:1;text-align:center}
.chart-axis span:first-child{text-align:left}
.chart-axis span:last-child{text-align:right}

/* ── COMPONENTS ── */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.comp-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px;color:var(--text-3);margin-bottom:9px}
.comp-rows{display:flex;flex-direction:column;gap:8px}
.comp-row{display:flex;align-items:center;gap:10px}
.comp-name{font-size:11.5px;color:var(--text-2);width:78px;flex-shrink:0}
.comp-bar-wrap{flex:1;height:5px;background:var(--border-strong);border-radius:3px;overflow:hidden}
.comp-bar{height:100%;border-radius:3px;transition:width .3s ease}
.comp-val{font-size:11px;color:var(--text-2);font-family:var(--mono);width:36px;text-align:right;flex-shrink:0}
.comp-wt{font-size:10px;color:var(--text-3);width:30px;text-align:right;flex-shrink:0}
.conf-box{background:var(--surface-alt);border:1px solid var(--border);border-radius:8px;padding:12px 13px}
.conf-box-row{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.conf-box-val{font-size:13px;font-weight:600;color:var(--text-1)}
.conf-box-note{font-size:11px;color:var(--text-3);line-height:1.55}
.callout{font-size:11.5px;color:var(--text-2);background:var(--blue-s);border-left:3px solid var(--blue);border-radius:0 6px 6px 0;padding:9px 12px;margin-top:11px;line-height:1.55}
.callout b{color:var(--text-1);font-weight:600}

/* ── EXPLORE ROWS ── */
.explore-row{margin-bottom:28px}
.row-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.row-title{font-size:13px;font-weight:600}
.row-count{font-size:11px;color:var(--text-3);background:var(--surface-alt);border:1px solid var(--border);border-radius:10px;padding:1px 8px}
.row-sort{margin-left:auto;font-size:11px;color:var(--text-3)}
.row-cards{display:flex;gap:10px;overflow-x:auto;padding-bottom:5px}
.row-cards::-webkit-scrollbar{height:3px}
.row-cards::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:2px}

/* ── PROPERTY CARD ── */
.prop-card{flex:0 0 192px;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:13px;cursor:pointer;transition:all .15s;position:relative;user-select:none}
.prop-card:hover{border-color:var(--border-strong);box-shadow:0 2px 12px rgba(0,0,0,.06)}
.prop-card.selected{border-color:var(--accent)!important;background:var(--accent-s)}
.prop-card.selected .pc-score{color:var(--accent)}
.pc-hdr{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.pc-av{width:36px;height:36px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0;border:1px solid}
.pc-info .pc-name{font-size:13px;font-weight:600;color:var(--text-1);line-height:1.3}
.pc-info .pc-flag{font-size:11px;color:var(--text-3);margin-top:1px}
.pc-score{font-size:26px;font-weight:600;color:var(--text-1);line-height:1;font-family:var(--mono);letter-spacing:-0.5px}
.pc-score-lbl{font-size:10.5px;color:var(--text-3);margin-top:2px;margin-bottom:8px}
.pc-foot{display:flex;align-items:center;gap:6px;border-top:1px solid var(--border);padding-top:7px;font-size:11px}
.pc-trend{font-weight:500}
.pc-conf{margin-left:auto;display:flex;align-items:center;gap:4px;color:var(--text-3)}
.pc-suppressed{position:absolute;inset:0;background:rgba(249,249,248,.88);border-radius:7px;display:flex;align-items:center;justify-content:center;padding:14px;text-align:center}
.supp-label{font-size:11px;color:var(--text-3);line-height:1.5}
.supp-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:500;background:var(--red-s);color:var(--red);border:1px solid var(--red-m);border-radius:4px;padding:2px 7px;margin-bottom:5px}
.event-date{font-size:10.5px;color:var(--text-3);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}

/* ── SECTION DIVIDER ── */
.sec-divider{height:1px;background:var(--border);margin:4px 0 24px}

/* ── PAGE HEADER ── */
.page-hdr{margin-bottom:22px}
.page-title{font-size:20px;font-weight:600;color:var(--text-1);letter-spacing:-0.3px}
.page-sub{font-size:12px;color:var(--text-3);margin-top:2px}
</style>
</head>

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function trendHtml(v, short = false) {
  if (v == null) return '<span class="trend-neu">--</span>';
  const abs = Math.abs(v).toFixed(short ? 2 : 3);
  if (v >  0.05) return `<span class="trend-up">&#8593; +${abs}${short ? '' : '/day'}</span>`;
  if (v < -0.05) return `<span class="trend-dn">&#8595; -${abs}${short ? '' : '/day'}</span>`;
  return '<span class="trend-neu">&#8594; Stable</span>';
}

function confDotHtml(band) {
  const cls = { High:'conf-h', Medium:'conf-m', Low:'conf-l' }[band] ?? 'conf-l';
  return `<span class="conf-dot ${cls}"></span>`;
}

// ────────────────────────────────────────────────────────────────
// SVG SPARKLINE
// ────────────────────────────────────────────────────────────────

function buildChart(vals, W, H, padX = 12, padY = 10) {
  const min = Math.min(...vals) - 2;
  const max = Math.max(...vals) + 2;
  const ew = W - padX * 2;
  const eh = H - padY * 2;
  const n  = vals.length - 1;

  const pts = vals.map((v, i) => [
    padX + (i / n) * ew,
    padY + (1 - (v - min) / (max - min)) * eh
  ]);

  const linePath = pts.map((p,i) =>
    (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)
  ).join(' ');

  const bottom = H - padY + 3;
  const areaPath = linePath +
    ` L${pts[pts.length-1][0].toFixed(1)},${bottom} L${padX},${bottom} Z`;

  const avgV   = vals.reduce((a,b) => a+b, 0) / vals.length;
  const avgY   = (padY + (1 - (avgV - min) / (max - min)) * eh).toFixed(1);
  const lastPt = pts[pts.length - 1];

  return { linePath, areaPath, avgY, avgV: avgV.toFixed(1),
           lastX: lastPt[0].toFixed(1), lastY: lastPt[1].toFixed(1), W, H };
}

function renderCard(p, typeKey) {
  const tc = TYPE_COLOR[typeKey];
  const inits = initials(p.name);
  const isSelected = p.id === selectedId;
  const score = p.s30 != null ? p.s30.toFixed(1) : '--';

  let footer = '';
  if (!p.suppressed) {
    footer = `<div class="pc-foot">
      ${trendHtml(p.t30, true)}
      <div class="pc-conf">${confDotHtml(p.conf)}<span>${p.conf}</span></div>
    </div>`;
  }

  const eventDateRow = p.eventDate
    ? `<div class="event-date">${p.eventDate}</div>` : '';

  const suppressedOverlay = p.suppressed
    ? `<div class="pc-suppressed">
         <div>
           <div class="supp-pill">${confDotHtml('Low')} Low confidence</div>
           <div class="supp-label">Insufficient data coverage.<br>FanScore suppressed.</div>
         </div>
       </div>` : '';

  return `
    <div class="prop-card${isSelected ? ' selected' : ''}" id="card-${p.id}" onclick="selectCard('${p.id}')">
      <div class="pc-hdr">
        <div class="pc-av" style="background:${tc.bg};color:${tc.fg};border-color:${tc.bd}">${inits}</div>
        <div class="pc-info">
          <div class="pc-name">${p.name}</div>
          <div class="pc-flag">${FLAG[p.country] || ''} ${p.country}</div>
        </div>
      </div>
      <div class="pc-score">${score}</div>
      <div class="pc-score-lbl">30-day avg FanScore</div>
      ${footer}
      ${eventDateRow}
      ${suppressedOverlay}
    </div>`;
}

function renderRow(title, typeKey, items) {
  const tc = TYPE_COLOR[typeKey];
  const cards = items.map(p => renderCard(p, typeKey)).join('');
  return `
    <div class="explore-row" data-type="${typeKey}">
      <div class="row-hdr">
        <span class="row-title" style="color:${tc.fg}">${title}</span>
        <span class="row-count">${items.length}</span>
        <span class="row-sort">sorted by 30d FanScore</span>
      </div>
      <div class="row-cards">${cards}</div>

}

  const el = document.getElementById('card-' + id);
  if (el) el.classList.add('selected');
  selectedId = id;

  // If Eclipse Motorsports selected, show full detail; else show partial
  const fp = document.getElementById('focus-panel');
  if (id === '25e19eeb') {
    fp.innerHTML = renderFocusPanel(ECLIPSE_DETAIL, ECLIPSE_SERIES);
  } else {
    // Find property across all lists
    const allProps = [
      ...DRIVERS.map(p => ({...p, type:'driver'})),
      ...TEAMS.map(p => ({...p, type:'team'})),
      ...SERIES.map(p => ({...p, type:'series'})),
      ...EVENTS.map(p => ({...p, type:'event'}))
    ];
    const prop = allProps.find(p => p.id === id);
    if (prop) fp.innerHTML = renderGenericFocus(prop);
  }

  // Scroll to top of focus panel
  fp.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ────────────────────────────────────────────────────────────────
// FILTER
// ────────────────────────────────────────────────────────────────

function setFilter(filter) {
  // Update pill active state
  document.querySelectorAll('.pill[data-filter]').forEach(p => {
    p.classList.toggle('active', p.dataset.filter === filter);
  });

  // Show / hide rows
  document.querySelectorAll('.explore-row[data-type]').forEach(row => {
    const show = filter === 'all' || row.dataset.type === filter;
    row.style.display = show ? '' : 'none';
  });
}

    renderRow('Series', 'series', SERIES) +
    renderRow('Events', 'event', EVENTS);
}
