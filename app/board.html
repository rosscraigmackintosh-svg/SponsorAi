<!-- ─────────────────────────────── MAIN ─────────────────────────────── -->
<main class="main" id="main-content" tabindex="-1">

  <!-- Board header — outside .content so it can span full width -->

    <div class="board-page-header-inner">

  <!-- Board content -->
  <div id="board-content" class="board-wrap" style="display:none">

    <div class="board-columns" id="board-columns">

      <!-- Watching -->
      <div class="board-col" data-stage="watching">

          <span class="board-col-title">Watching</span>
          <span class="board-col-count" id="count-watching">0</span>
        </div>
        <div class="board-col-body"
             id="col-watching"
             ondragover="handleDragOver(event,'watching')"
             ondrop="handleDrop(event,'watching')"
             ondragleave="handleDragLeave(event)">
        </div>
      </div>

      <!-- Shortlist -->
      <div class="board-col" data-stage="shortlist">
        <div class="board-col-header">
          <span class="board-col-title">Shortlist</span>
          <span class="board-col-count" id="count-shortlist">0</span>
        </div>
        <div class="board-col-body"
             id="col-shortlist"
             ondragover="handleDragOver(event,'shortlist')"
             ondrop="handleDrop(event,'shortlist')"
             ondragleave="handleDragLeave(event)">
        </div>
      </div>

      <!-- Under Evaluation -->
      <div class="board-col" data-stage="evaluation">
        <div class="board-col-header">
          <span class="board-col-title">Under Evaluation</span>
          <span class="board-col-count" id="count-evaluation">0</span>
        </div>
        <div class="board-col-body"
             id="col-evaluation"
             ondragover="handleDragOver(event,'evaluation')"
             ondrop="handleDrop(event,'evaluation')"
             ondragleave="handleDragLeave(event)">
        </div>
      </div>

      <!-- Confirmed -->
      <div class="board-col" data-stage="confirmed">
        <div class="board-col-header">
          <span class="board-col-title">Confirmed</span>
          <span class="board-col-count" id="count-confirmed">0</span>
        </div>
        <div class="board-col-body"
             id="col-confirmed"
             ondragover="handleDragOver(event,'confirmed')"
             ondrop="handleDrop(event,'confirmed')"
             ondragleave="handleDragLeave(event)">
        </div>
      </div>

    </div>

  </div>

</main>

<script>

/* ── Theme ────────────────────────────────────────────────────────── */
SAI_UIH.initTheme();

/* ── Global state ──────────────────────────────────────────────────── */
/* Map of slug -> property data object, populated after fetch */
var boardProperties = {};
/* Slug being dragged, set on dragstart */
var _dragSlug  = null;
var _dragStage = null;

/* ── Stage labels ──────────────────────────────────────────────────── */
var STAGE_LABELS = {
  watching:   'Watching',
  shortlist:  'Shortlist',
  evaluation: 'Under Evaluation',
  confirmed:  'Confirmed'
};

/* ── Load board ────────────────────────────────────────────────────── */
function loadBoard() {
  var slugs = SAI_STORAGE.board.getAllSlugs();

  if (slugs.length === 0) {
    showEmpty();
    return;
  }

  var cols = 'property_id,property_name,property_type,slug,country,avg_score_30d,' +
             'trend_value_30d,confidence_band_30d,suppression_reason_30d,' +
             'total_followers_latest,sport,region';
  var slugList = slugs.map(function(s) { return encodeURIComponent(s); }).join(',');

  apiFetch('/v_property_summary_current?slug=in.(' + slugList + ')&select=' + cols + '&visible_in_ui=eq.true')
    .then(function(rows) {
      boardProperties = {};
      (rows || []).forEach(function(r) { boardProperties[r.slug] = r; });
      renderBoard();
      document.getElementById('state-loading').style.display = 'none';
      document.getElementById('board-content').style.display = '';
      updateSubtitle(slugs.length);
    })
    .catch(function(err) {
      document.getElementById('state-loading').innerHTML =
        '<div class="state-msg" style="color:var(--negative)"><strong>Error loading board</strong><br>' +
        escHtml(err.message) + '</div>';
    });
}

function showEmpty() {
  document.getElementById('state-loading').style.display = 'none';
  document.getElementById('board-content').style.display = '';
  updateSubtitle(0);
  /* Render all columns as empty */
  SAI_STORAGE.board.stages.forEach(function(stage) {
    renderColumn(stage, []);
  });
}

function updateSubtitle(count) {
  var el   = document.getElementById('board-subtitle');
  var link = document.getElementById('board-explore-link');
  if (count === 0) {
    el.textContent = 'No properties on board';
    if (link) { link.textContent = 'Browse Explore to add properties'; link.removeAttribute('aria-label'); }
  } else if (count === 1) {
    el.textContent = '1 property tracked';
    if (link) { link.textContent = 'Add more from Explore'; link.removeAttribute('aria-label'); }
  } else {
    el.textContent = count + ' properties tracked';
    if (link) { link.textContent = 'Add more from Explore'; link.removeAttribute('aria-label'); }
  }
}

/* ── Render board ──────────────────────────────────────────────────── */
function renderBoard() {
  var board = SAI_STORAGE.board.getBoard();
  SAI_STORAGE.board.stages.forEach(function(stage) {
    renderColumn(stage, board[stage] || []);
  });
}

function renderColumn(stage, slugs) {
  var col   = document.getElementById('col-' + stage);
  var count = document.getElementById('count-' + stage);
  if (!col) return;

  count.textContent = slugs.length;

  if (slugs.length === 0) {
    col.innerHTML = '<div class="board-col-empty">Drop a card here</div>';
    return;
  }

  var html = '';
  slugs.forEach(function(slug) {
    var prop = boardProperties[slug];
    if (!prop) return; /* may not be visible_in_ui */
    html += renderBoardCard(prop, stage);
  });
  col.innerHTML = html;
}

/* ── Render a single board card ────────────────────────────────────── */
function renderBoardCard(prop, stage) {
  var cfg        = TYPE[prop.property_type] || { label: prop.property_type, bgVar:'var(--surface-muted)', fgVar:'var(--text-2)', scoreVar:'var(--text-1)' };
  var suppressed = !!prop.suppression_reason_30d;
  var scoreVal   = suppressed ? '--' : fmtScore(prop.avg_score_30d);
  var scoreColor = suppressed ? 'var(--text-3)' : (cfg.scoreVar || 'var(--text-1)');
  var trendArrow = (!suppressed && prop.trend_value_30d != null) ? arr(prop.trend_value_30d) : '';
  var trendClr   = (!suppressed && prop.trend_value_30d != null) ? arrC(prop.trend_value_30d) : 'var(--text-3)';
  var audience   = fmtFollowers(prop.total_followers_latest);
  var flag       = countryFlag(prop.country);
  var slug       = prop.slug;

  /* Move-to select: shows only the other 3 stages */
  var moveOpts = '';
  SAI_STORAGE.board.stages.forEach(function(s) {
    if (s !== stage) {
      moveOpts += '<option value="' + s + '">' + STAGE_LABELS[s] + '</option>';
    }
  });

  var h = '';
  h += '<div class="board-card" draggable="true"' +
       ' data-slug="' + escHtml(slug) + '"' +
       ' data-stage="' + stage + '"' +
       ' ondragstart="handleDragStart(event,\'' + escHtml(slug) + '\',\'' + stage + '\')"' +
       ' ondragend="handleDragEnd(event)">';

  /* Header: drag handle + name + flag */
  h += '<div class="board-card-header">';
  h += '<div class="board-card-drag" aria-hidden="true">' +
       '<svg width="10" height="14" viewBox="0 0 10 14" fill="none" aria-hidden="true">' +
       '<circle cx="3" cy="3"  r="1.2" fill="currentColor"/>' +
       '<circle cx="7" cy="3"  r="1.2" fill="currentColor"/>' +
       '<circle cx="3" cy="7"  r="1.2" fill="currentColor"/>' +
       '<circle cx="7" cy="7"  r="1.2" fill="currentColor"/>' +
       '<circle cx="3" cy="11" r="1.2" fill="currentColor"/>' +
       '<circle cx="7" cy="11" r="1.2" fill="currentColor"/>' +
       '</svg></div>';
  h += '<div class="board-card-name"><a class="board-card-name-link" href="property.html?slug=' + encodeURIComponent(slug) + '&ref=board">' + escHtml(prop.property_name) + '</a></div>';
  if (flag) h += '<span class="board-card-flag">' + flag + '</span>';
  h += '</div>'; /* /header */

  /* Meta: type badge + sport */
  h += '<div class="board-card-meta">';
  h += SAI_UIH.typeBadgeHtml(prop.property_type);
  if (prop.sport) h += '<span class="board-card-sport">' + escHtml(prop.sport) + '</span>';
  h += '</div>';

  /* Signals: FanScore + audience + confidence */
  var confBand = prop.confidence_band_30d || null;
  h += '<div class="board-card-signals">';
  h += '<div class="board-card-score">';
  h += '<span class="board-card-score-val" style="color:' + scoreColor + '">' + scoreVal + '</span>';
  if (trendArrow) h += '<span class="board-card-score-trend" style="color:' + trendClr + '">' + trendArrow + '</span>';
  h += '<span class="board-card-score-label">FanScore</span>';
  h += '</div>';
  if (audience) {
    h += '<div class="board-card-audience">';
    h += '<span class="board-card-audience-val">' + audience + '</span>';
    h += '<span class="board-card-audience-label">Audience</span>';
    h += '</div>';
  }
  if (confBand) {
    h += '<div class="board-card-conf">';
    h += '<span class="board-card-conf-val">' + escHtml(confBand) + '</span>';
    h += '<span class="board-card-conf-label">Confidence</span>';
    h += '</div>';
  }
  h += '</div>'; /* /signals */

  /* Actions: View + Move dropdown + Compare + Remove */
  h += '<div class="board-card-actions">';
  h += '<button class="board-card-btn" onclick="navigateTo(\'property.html?slug=' +
       encodeURIComponent(slug) + '&ref=board\')" title="View full profile">View</button>';
  h += '<label class="board-card-move-wrap" title="Move to another stage">';
  h += '<span class="board-card-move-label">Move</span>';
  h += '<select class="board-card-move" onchange="moveBoardCard(\'' + escHtml(slug) + '\',this.value,\'' + stage + '\');this.value=\'\'">';
  h += '<option value="" disabled selected></option>';
  h += moveOpts;
  h += '</select>';
  h += '</label>';
  h += '<button class="board-card-btn" onclick="navigateTo(\'compare.html?a=' +
       encodeURIComponent(slug) + '\')" title="Compare in side-by-side view">Compare</button>';
  h += '<button class="board-card-btn board-card-remove" onclick="removeBoardCard(\'' + escHtml(slug) + '\')" title="Remove from board" aria-label="Remove ' + escHtml(prop.property_name) + ' from board">&times;</button>';
  h += '</div>'; /* /actions */

  h += '</div>'; /* /board-card */
  return h;
}

/* ── Board mutations ───────────────────────────────────────────────── */
function moveBoardCard(slug, targetStage, currentStage) {
  if (!targetStage || targetStage === currentStage) return;
  SAI_STORAGE.board.moveToStage(slug, targetStage);
  var board    = SAI_STORAGE.board.getBoard();
  var allSlugs = SAI_STORAGE.board.getAllSlugs();
  SAI_STORAGE.board.stages.forEach(function(s) {
    if (s === currentStage || s === targetStage) renderColumn(s, board[s] || []);
  });
  updateSubtitle(allSlugs.length);
}

function removeBoardCard(slug) {
  SAI_STORAGE.board.removeFromBoard(slug);
  delete boardProperties[slug];
  renderBoard();
  updateSubtitle(SAI_STORAGE.board.getAllSlugs().length);
}

/* ── Drag and drop ─────────────────────────────────────────────────── */
function handleDragStart(event, slug, stage) {
  _dragSlug  = slug;
  _dragStage = stage;
  event.dataTransfer.effectAllowed = 'move';
  event.dataTransfer.setData('text/plain', slug);
  /* Visually fade the card being dragged */
  var card = event.currentTarget;
  setTimeout(function() { card.classList.add('dragging'); }, 0);
}

function handleDragEnd(event) {
  _dragSlug  = null;
  _dragStage = null;
  document.querySelectorAll('.board-card.dragging').forEach(function(el) {
    el.classList.remove('dragging');
  });
  document.querySelectorAll('.board-col-body.drag-over').forEach(function(el) {
    el.classList.remove('drag-over');
  });
}

function handleDragOver(event, stage) {
  event.preventDefault();
  event.dataTransfer.dropEffect = 'move';
  var colBody = document.getElementById('col-' + stage);
  if (colBody && !colBody.classList.contains('drag-over')) {
    colBody.classList.add('drag-over');
  }
}

function handleDragLeave(event) {
  /* Only clear when truly leaving the column body (not entering a child) */
  var colBody = event.currentTarget;
  if (!colBody.contains(event.relatedTarget)) {
    colBody.classList.remove('drag-over');
  }
}

function handleDrop(event, targetStage) {
  event.preventDefault();
  var col = document.getElementById('col-' + targetStage);
  if (col) col.classList.remove('drag-over');

  var slug = _dragSlug || event.dataTransfer.getData('text/plain');
  if (!slug || targetStage === _dragStage) return;

  SAI_STORAGE.board.moveToStage(slug, targetStage);
  var board = SAI_STORAGE.board.getBoard();
  /* Re-render both affected columns */
  if (_dragStage) renderColumn(_dragStage, board[_dragStage] || []);
  renderColumn(targetStage, board[targetStage] || []);
  updateSubtitle(SAI_STORAGE.board.getAllSlugs().length);

  _dragSlug  = null;
  _dragStage = null;
}

/* ── Menu listeners ────────────────────────────────────────────────── */
SAI_UIH.initMenuListeners();

/* ── Init ──────────────────────────────────────────────────────────── */
(function init() {
  loadBoard();
})();

</script>

}

.board-card.dragging {

}

}

/* Header row */
.board-card-header {
