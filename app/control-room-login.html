<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SponsorAI — Control Room Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f7f7f8;
  --surface:    #ffffff;
  --border:     #e5e5e7;
  --text-1:     #111113;
  --text-2:     #44444a;
  --text-3:     #8a8a94;
  --accent:     #f43f5e;
  --accent-hover: #e11d48;
  --accent-soft:  #fff1f2;
  --radius-md:  8px;
  --radius-sm:  6px;
  --shadow-sm:  0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}

[data-theme="dark"] {
  --bg:         #0d0d0f;
  --surface:    #18181c;
  --border:     #2a2a30;
  --text-1:     #f2f2f4;
  --text-2:     #a8a8b2;
  --text-3:     #5a5a64;
  --accent-soft: rgba(244,63,94,0.08);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.cr-login-wrap {
  width: 100%;
  max-width: 380px;
}

.cr-login-logo {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 32px;
  text-align: center;
}

.cr-login-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 32px;
  box-shadow: var(--shadow-sm);
}

.cr-login-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-1);
  margin-bottom: 6px;
}

.cr-login-sub {
  font-size: 13px;
  color: var(--text-3);
  margin-bottom: 28px;
  line-height: 1.5;
}

.cr-login-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: #b45309;
  background: #fffbeb;
  border: 1px solid #fde68a;
  border-radius: 4px;
  padding: 2px 7px;
  margin-bottom: 20px;
  line-height: 1.5;
}

[data-theme="dark"] .cr-login-badge {
  color: #fbbf24;
  background: rgba(251,191,36,0.08);
  border-color: rgba(251,191,36,0.2);
}

.cr-login-label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 6px;
}

.cr-login-input {
  display: block;
  width: 100%;
  padding: 9px 12px;
  font-size: 14px;
  font-family: inherit;
  color: var(--text-1);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.12s ease;
  margin-bottom: 16px;
}

.cr-login-input:focus {
  border-color: var(--accent);
}

.cr-login-input.is-error {
  border-color: #ef4444;
}

.cr-login-btn {
  display: block;
  width: 100%;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  color: #fff;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background 0.12s ease, opacity 0.12s ease;
}

.cr-login-btn:hover {
  background: var(--accent-hover);
}

.cr-login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.cr-login-error {
  font-size: 12px;
  color: #ef4444;
  margin-top: -8px;
  margin-bottom: 14px;
  min-height: 16px;
  line-height: 1.4;
}

/* Sent state — hidden until magic link sent */
.cr-login-sent {
  display: none;
  text-align: center;
  padding: 8px 0 4px;
}

.cr-login-sent-icon {
  font-size: 28px;
  margin-bottom: 12px;
}

.cr-login-sent-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-1);
  margin-bottom: 8px;
}

.cr-login-sent-sub {
  font-size: 13px;
  color: var(--text-3);
  line-height: 1.5;
}

</style>
</head>
<body>

<div class="cr-login-wrap">
  <div class="cr-login-logo">SponsorAI</div>
  <div class="cr-login-card">
    <div class="cr-login-badge">Internal only</div>
    <h1 class="cr-login-title">Control Room</h1>
    <p class="cr-login-sub">Enter your admin email address. A sign-in link will be sent to your inbox.</p>

    <form id="crLoginForm" novalidate>
      <label class="cr-login-label" for="crEmailInput">Email address</label>
      <input class="cr-login-input" type="email" id="crEmailInput"
             placeholder="you@example.com" autocomplete="email" autofocus>
      <div class="cr-login-error" id="crLoginError"></div>
      <button class="cr-login-btn" type="submit">Send sign-in link</button>
    </form>

    <div class="cr-login-sent" id="crLoginSent">
      <div class="cr-login-sent-icon">&#9993;</div>
      <div class="cr-login-sent-title">Check your inbox</div>
      <div class="cr-login-sent-sub">A sign-in link has been sent to your email address. Click it to access the Control Room.</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<script>
(function() {
  'use strict';

  if (!window.supabase || typeof window.supabase.createClient !== 'function') {
    console.error('[SponsorAI] Control Room login: Supabase SDK not found.');
    return;
  }

  var supabaseUrl = API_URL.replace('/rest/v1', '');
  var db = window.supabase.createClient(supabaseUrl, API_KEY);

  /* If already authenticated, go straight to the Control Room */
  db.auth.getSession().then(function(result) {
    var session = result.data && result.data.session;
    if (session) {
      window.location.replace('control-room.html');
    }
  });

  var form       = document.getElementById('crLoginForm');
  var emailInput = document.getElementById('crEmailInput');
  var errorEl    = document.getElementById('crLoginError');
  var sentEl     = document.getElementById('crLoginSent');

  if (emailInput) {
    emailInput.addEventListener('input', function() {
      if (errorEl) errorEl.textContent = '';
      emailInput.classList.remove('is-error');
    });
  }

  if (form) {
    form.addEventListener('submit', function(e) {
      e.preventDefault();
      var email = emailInput ? emailInput.value.trim() : '';

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) {
        if (errorEl)    errorEl.textContent = 'Please enter a valid email address.';
        if (emailInput) emailInput.classList.add('is-error');
        return;
      }

      var btn = form.querySelector('.cr-login-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Sending\u2026'; }
      if (errorEl) errorEl.textContent = '';

      /* Redirect URL: same directory as this file, pointing at control-room.html */
      var redirectUrl = window.location.href
        .split('?')[0]
        .replace('control-room-login.html', 'control-room.html');

      db.auth.signInWithOtp({
        email: email,
        options: { emailRedirectTo: redirectUrl }
      }).then(function(result) {
        if (btn) { btn.disabled = false; btn.textContent = 'Send sign-in link'; }
        if (result.error) {
          if (errorEl) errorEl.textContent = 'Something went wrong. Please try again in a moment.';
          console.error('[SponsorAI] Control Room OTP error:', result.error);
        } else {
          form.style.display = 'none';
          if (sentEl) sentEl.style.display = 'block';
        }
      });
    });
  }

  /* Light/dark theme sync */
  var saved = localStorage.getItem('sa-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
})();
</script>

</body>
</html>
