              <button class="conf-item" role="menuitem" onclick="applyConf('low')">Low confidence</button>
              <div class="conf-divider" aria-hidden="true"></div>
              <button class="conf-item conf-item--muted" role="menuitem" onclick="applyConf('none')">No score</button>
            </div>
          </div>
          <!-- Divider -->
          <span class="eh-filter-sep" aria-hidden="true"></span>
          <!-- Sort — delegates to existing sort menu and bottom-bar trigger -->
          <button class="eh-filter-btn eh-filter-sort" onclick="toggleSortMenu()" aria-haspopup="true" aria-controls="sort-menu">
            <span id="eh-sort-label">Sort</span>
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1.5 3L4.5 6L7.5 3"/></svg>
          </button>
          <!-- Count — pushed right -->
          <span class="eh-filter-count" id="eh-count" aria-live="polite"></span>
        </div>

      </div>
    </div>


    <div class="card-grid" id="card-grid">
      <div class="state-msg">
        <div class="spinner"></div>
        Connecting to database&hellip;
      </div>
    </div>

    <!-- Load more footer -->
    <div class="explore-footer" id="explore-footer" style="display:none"></div>

    <!-- Site footer — always reachable -->
    <footer class="site-footer">
      <div class="sf-inner">
        <span class="sf-brand">SponsorAI</span>
        <span class="sf-dot" aria-hidden="true">&middot;</span>
        <span class="sf-tagline">Sponsorship Intelligence</span>
        <span class="sf-dot" aria-hidden="true">&middot;</span>
        <span class="sf-copy">&copy; 2026</span>
      </div>
    </footer>

  </div>
</main>

  <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M1.5 8L6 3.5 10.5 8"/>

<!-- ─────────────────────────────── SCRIPT ───────────────────────────────── -->
<script src="config.js"></script>

<script>

/* ── Theme ─────────────────────────────────────────────────────────────── */
SAI_UIH.initTheme();

/* ── Compare shortlist ───────────────────────────────────────────────── */
var compareList = [];

/* Returns true if the item is NOW in the selection (added), false if removed.
   Checks BOTH compareList and SAI_STORAGE so the active state at render time
   and the live tray state stay consistent. */
function compareToggle(id) {
  var card = allCards.filter(function(c) { return c.id === id; })[0];
  var slug = card ? card.slug : null;
  var idx = compareList.indexOf(id);
  var inStorage = slug && SAI_STORAGE.compare.has(slug);
  var wasIn = idx >= 0 || inStorage;

  if (wasIn) {
    if (idx >= 0) compareList.splice(idx, 1);
    if (slug) SAI_STORAGE.compare.remove(slug);
  } else {
    if (compareList.length >= 3) return false; /* queue full — no change */
    compareList.push(id);
    if (slug) SAI_STORAGE.compare.add(slug);
  }
  syncCompareButtons();
  updateCompareTray();
  /* Refresh table if it's currently open */
  var tray = document.getElementById('compare-tray');
  if (tray && tray.classList.contains('expanded')) buildCompareTable();
  return !wasIn; /* true = now in selection */
}

function syncCompareButtons() {
  var cmpCount = compareList.length;
  /* Sync hero-btn compare buttons (grid/list cards) */
  document.querySelectorAll('.hero-btn[data-action="compare"]').forEach(function(btn) {
    var isIn  = compareList.indexOf(btn.dataset.id) >= 0;
    var slug  = btn.dataset.slug || null;
    var inStorage = slug && SAI_STORAGE.compare.has(slug);
    var active = isIn || inStorage;
    var isFull = !active && cmpCount >= 3;
    btn.classList.toggle('active', active);
    btn.classList.toggle('disabled', isFull);
    btn.setAttribute('aria-disabled', isFull ? 'true' : 'false');
    btn.title = active   ? 'Remove from compare'
              : isFull   ? 'Compare queue full (3/3)'
              : cmpCount > 0 ? 'Add to compare (' + cmpCount + '/3 selected)'
              : 'Add to compare';
  });
  /* Legacy card-btn selectors (retain for compatibility) */
  document.querySelectorAll('.card-btn[data-action="compare"]').forEach(function(btn) {
    btn.classList.toggle('active', compareList.indexOf(btn.dataset.id) >= 0);
  });
}

/* Sync all hero-btn watchlist buttons for a given slug to the given state.
   Called after any watchlist toggle so card buttons stay current without a full re-render. */
function syncWatchlistButtons(slug, nowIn) {
  if (!slug) return;
  document.querySelectorAll('.hero-btn[data-action="watchlist"]').forEach(function(btn) {
    if (btn.dataset.slug !== slug) return;
    btn.classList.toggle('active', nowIn);
    btn.title = nowIn ? 'Remove from watchlist' : 'Add to watchlist';
  });
}

/* Sync all hero-btn portfolio buttons for a given slug to the given state.
   Called after any portfolio toggle so card buttons stay current without a full re-render. */
function syncPortfolioButtons(slug, nowIn) {
  if (!slug) return;
  document.querySelectorAll('.hero-btn[data-action="portfolio"]').forEach(function(btn) {
    if (btn.dataset.slug !== slug) return;
    btn.classList.toggle('active', nowIn);
    btn.title = nowIn ? 'Remove from portfolio' : 'Add to portfolio';
  });
}

/* Sync all hero-btn board buttons for a given slug to the given state.
   Called after any board toggle so card buttons stay current without a full re-render. */
function syncBoardButtons(slug, nowIn) {
  if (!slug) return;
  document.querySelectorAll('.hero-btn[data-action="board"]').forEach(function(btn) {
    if (btn.dataset.slug !== slug) return;
    btn.classList.toggle('active', nowIn);
    btn.title = nowIn ? 'Remove from Board' : 'Add to Board';
  });
}

function updateCompareTray() {
  var tray   = document.getElementById('compare-tray');
  var slots  = document.getElementById('compare-slots');
  var goBtn  = document.getElementById('compare-go-btn');
  if (!tray || !slots || !goBtn) return;

  var hasItems = compareList.length > 0;
  tray.classList.toggle('open', hasItems);
  document.body.classList.toggle('compare-open', hasItems);

  var html = '';
  compareList.forEach(function(id) {
    var c = allCards.filter(function(x) { return x.id === id; })[0];
    if (!c) return;
    var sup = !!c.sup30;
    html += '<div class="compare-slot">';
    html += '<span class="compare-slot-name" title="' + escHtml(c.name) + '">' + escHtml(c.name) + '</span>';
    if (!sup && c.s30 != null) html += '<span class="compare-slot-score">\u00B7 ' + fmtScore(c.s30) + '</span>';
    html += '<button class="compare-slot-remove" onclick="compareToggle(\'' + id + '\')" aria-label="Remove ' + escHtml(c.name) + '">\u00D7</button>';
    html += '</div>';
  });
  slots.innerHTML = html;
  goBtn.disabled = compareList.length < 2;
}

function clearCompare() {
  compareList = [];
  SAI_STORAGE.compare.set([]);
  var wrap = document.getElementById('compare-table-wrap');
  var tray = document.getElementById('compare-tray');
  var goBtn = document.getElementById('compare-go-btn');
  if (wrap) wrap.innerHTML = '';
  if (tray) tray.classList.remove('expanded');
  if (goBtn) goBtn.textContent = 'Compare';
  syncCompareButtons();
  updateCompareTray();
}

function toggleCompareTable() {
  var tray  = document.getElementById('compare-tray');
  var goBtn = document.getElementById('compare-go-btn');
  if (!tray || !goBtn) return;
  var isExpanded = tray.classList.contains('expanded');
  if (isExpanded) {
    tray.classList.remove('expanded');
    goBtn.textContent = 'Compare';
  } else {
    buildCompareTable();
    tray.classList.add('expanded');
    goBtn.textContent = 'Close';
  }
}

function buildCompareTable() {
  var wrap = document.getElementById('compare-table-wrap');
  if (!wrap) return;
  var cards = compareList.map(function(id) {
    return allCards.filter(function(x) { return x.id === id; })[0];
  }).filter(Boolean);
  if (cards.length < 2) return;

  var rows = [
    { label: 'FanScore (30d avg)', fn: function(c) { return !!c.sup30 ? '--' : fmtScore(c.s30); }, size: 'lg' },
    { label: '30-day trend',       fn: function(c) { return c.t30 != null ? arr(c.t30) + '\u2009' + Math.abs(c.t30).toFixed(2) + '/d' : '--'; }, color: function(c) { return c.t30 != null ? arrC(c.t30) : null; } },
    { label: 'Confidence',         fn: function(c) { return c.conf30 || '--'; } },
    { label: 'Followers',          fn: function(c) { return (c.followers && c.followers > 0) ? fmtFollowers(c.followers) : '--'; }, signal: true },
    { label: 'Engagement rate',    fn: function(c) { return c.engRate30d != null ? c.engRate30d.toFixed(2) + '%' : '--'; }, signal: true },
    { label: 'Interactions (30d)', fn: function(c) { return (c.interactions30d && c.interactions30d > 0) ? fmtFollowers(c.interactions30d) : '--'; } },
    { label: 'Platforms',          fn: function(c) { return (c.platforms && c.platforms.length) ? c.platforms.map(function(p) { return PLATFORM_LABELS[p] || p; }).join(' \u00B7 ') : '--'; } }
  ];

  /* Header */
  var h = '<table class="compare-table"><thead><tr>';
  h += '<th class="compare-th-label"></th>';
  cards.forEach(function(c) {
    var cfg = TYPE[c.type] || { label: c.type, fgVar: 'var(--text-3)' };
    h += '<th class="compare-th-prop">';
    h += '<span class="compare-th-name">' + escHtml(c.name) + '</span>';
    h += '<span class="compare-th-type" style="color:' + cfg.fgVar + '">' + (cfg.label || c.type) + '</span>';
    h += '</th>';
  });
  h += '</tr></thead><tbody>';

  /* Sparkline row */
  var hasSparks = cards.some(function(c) { return !c.sup30 && c.sparks && c.sparks.length >= 2; });
  if (hasSparks) {
    /* POLISH: spark label uses text-3 explicitly — subordinate to value rows */
    h += '<tr class="compare-tr"><td class="compare-td-label" style="color:var(--text-3)">Score history</td>';
    cards.forEach(function(c) {
      var cfg = TYPE[c.type] || {};
      var sup = !!c.sup30;
      h += '<td class="compare-td-val">';
      if (!sup && c.sparks && c.sparks.length >= 2) {
        h += '<div class="compare-spark">' + renderSpark(c.sparks, cfg.scoreVar || 'var(--text-3)', 120, 32) + '</div>';
      } else {
        h += '<span style="color:var(--text-3)">--</span>';
      }
      h += '</td>';
    });
    h += '</tr>';
  }

  /* Signal rows */
  rows.forEach(function(row) {
    h += '<tr class="compare-tr"><td class="compare-td-label">' + row.label + '</td>';
    cards.forEach(function(c) {
      var val   = row.fn(c);
      var color = row.color ? row.color(c) : null;
      var style = color ? ' style="color:' + color + '"' : '';
      /* POLISH: compare-highlight for FanScore, compare-signal for key audience metrics */
      var cls = row.size === 'lg' ? ' compare-highlight' : (row.signal ? ' compare-signal' : '');
      h += '<td class="compare-td-val' + cls + '"' + style + '>' + val + '</td>';
    });
    h += '</tr>';
  });

  h += '</tbody></table>';
  wrap.innerHTML = h;
}

/* ── Card hero-btn action handler (event delegation) ─────────────────── */
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.hero-btn[data-action]');
  if (!btn) return;
  e.stopPropagation();
  var action = btn.dataset.action;
  var id     = btn.dataset.id;
  var slug   = btn.dataset.slug || null;
  /* Fallback: resolve slug from allCards if not on element */
  if (!slug && id) {
    var _c = allCards.filter(function(c) { return c.id === id; })[0];
    slug = _c ? _c.slug : null;
  }
  if (action === 'watchlist') {
    if (!slug) return;
    var nowIn = SAI_STORAGE.watchlist.toggle(slug);
    syncWatchlistButtons(slug, nowIn);
    /* If the panel is open for this card, keep its Watch button in sync too */
    if (detailCardId === id) _dpRefreshBtn('dp-btn-watch', 'Watching', 'Watch', nowIn);
  } else if (action === 'portfolio') {
    if (!slug) return;
    var nowIn = SAI_STORAGE.portfolio.toggle(slug);
    syncPortfolioButtons(slug, nowIn);
    /* If the panel is open for this card, keep its Portfolio button in sync too */
    if (detailCardId === id) _dpRefreshBtn('dp-btn-portfolio', 'In portfolio', 'Portfolio', nowIn);
  } else if (action === 'compare') {
    compareToggle(id); /* calls syncCompareButtons() which updates all hero-btn states */
  } else if (action === 'board') {
    if (!slug) return;
    var wasIn = SAI_STORAGE.board.isOnBoard(slug);
    if (wasIn) {
      SAI_STORAGE.board.removeFromBoard(slug);
    } else {
      SAI_STORAGE.board.addToStage(slug, 'watching');
    }
    var nowIn = !wasIn;
    syncBoardButtons(slug, nowIn);
    /* If the overlay is open for this card, keep its Board button in sync too */
    if (detailCardId === id) {
      var _lbl = nowIn ? 'Watching' : 'Add to Board';
      _dpRefreshBtn('dp-btn-board', _lbl, _lbl, nowIn);
    }
  }
});

/* ── Close menus on outside click ────────────────────────────────────── */
document.addEventListener('click', function(e) {
  var navMenu     = document.getElementById('nav-menu');
  var menuBtn     = document.getElementById('menu-btn');
  var profMenu    = document.getElementById('profile-menu');
  var profBtn     = document.getElementById('profile-btn');
  var sortMenu    = document.getElementById('sort-menu');
  var sortTrigger = document.getElementById('sort-trigger');
  var sportMenu   = document.getElementById('sport-menu');
  var sportBtn    = document.getElementById('sport-btn');
  var geoMenu     = document.getElementById('geo-menu');
  var geoBtn      = document.getElementById('geo-btn');
  var confMenu    = document.getElementById('conf-menu');
  var confBtn     = document.getElementById('conf-btn');
  var audMenu     = document.getElementById('aud-menu');
  var audBtn      = document.getElementById('aud-btn');

  if (navMenuOpen && !navMenu.contains(e.target) && !menuBtn.contains(e.target)) {
    closeNavMenu();
  }
  if (profileMenuOpen && !profMenu.contains(e.target) && !profBtn.contains(e.target)) {
    closeProfileMenu();
  }
  if (sortMenuOpen && sortMenu && !sortMenu.contains(e.target) && sortTrigger && !sortTrigger.contains(e.target)) {
    closeSortMenu();
  }
  if (_sportMenuOpen && sportMenu && !sportMenu.contains(e.target) && sportBtn && !sportBtn.contains(e.target)) {
    closeSportMenu();
  }
  if (_geoMenuOpen && geoMenu && !geoMenu.contains(e.target) && geoBtn && !geoBtn.contains(e.target)) {
    closeGeoMenu();
  }
  if (_confMenuOpen && confMenu && !confMenu.contains(e.target) && confBtn && !confBtn.contains(e.target)) {
    closeConfMenu();
  }
  if (_audMenuOpen && audMenu && !audMenu.contains(e.target) && audBtn && !audBtn.contains(e.target)) {
    closeAudMenu();
  }
});

/* ── Escape key closes all panels ───────────────────────────────────── */
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Escape') return;
  if (detailOpen)      closeDetail();
  if (chatOpen)        closeChat();
  if (navMenuOpen)     closeNavMenu();
  if (profileMenuOpen) closeProfileMenu();
  if (sortMenuOpen)    closeSortMenu();
  if (_sportMenuOpen)  closeSportMenu();
  if (_geoMenuOpen)    closeGeoMenu();
  if (_confMenuOpen)   closeConfMenu();
  if (_audMenuOpen)    closeAudMenu();
});

/* ── / shortcut — focus search field ────────────────────────────────── */
document.addEventListener('keydown', function(e) {
  if (e.key !== '/') return;
  var tag = document.activeElement ? document.activeElement.tagName.toUpperCase() : '';
  var editable = document.activeElement && document.activeElement.isContentEditable;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || editable) return;
  e.preventDefault();
  var si = document.getElementById('search-input');
  if (si) { si.focus(); si.select(); }
});

/* ── Init ─────────────────────────────────────────────────────────────── */
(function init(){
  loadGrid()
    .then(function(cards){
      allCards = cards;
      /* Restore compareList from SAI_STORAGE so tray and active states are consistent */
      var _savedCmp = SAI_STORAGE.compare.get();
      compareList = allCards
        .filter(function(c) { return c.slug && _savedCmp.indexOf(c.slug) >= 0; })
        .map(function(c) { return c.id; });
      renderGrid(activeFilter);
      if (compareList.length > 0) updateCompareTray();
    })
    .catch(function(err){
      document.getElementById('card-grid').innerHTML=
        '<div class="state-msg" style="color:var(--negative)"><strong>Error loading data</strong><br>'+err.message+'</div>';
      var el = document.getElementById('page-meta');
      if (el) el.textContent = 'Connection error';
    });

  /* Card action buttons — watchlist / compare / portfolio */
  document.getElementById('card-grid').addEventListener('click', function(e) {
    var btn = e.target.closest('.card-btn');
    if (!btn) return;
    e.stopPropagation();
    if (btn.dataset.action === 'compare') {
      compareToggle(btn.dataset.id);
    } else {
      btn.classList.toggle('active');
    }
  });

  /* Chat bottom fade — show only when content is hidden below */
  var cpMsgs = document.getElementById('cp-msgs');
  var cpFade = document.getElementById('cp-fade-bottom');
  function updateBottomFade() {
    var atBottom = cpMsgs.scrollHeight - cpMsgs.scrollTop - cpMsgs.clientHeight < 8;
    cpFade.classList.toggle('visible', !atBottom);
  }
  cpMsgs.addEventListener('scroll', updateBottomFade);

  /* Search input — debounced so rapid typing doesn't thrash the card animation */
  var _searchInput = document.getElementById('search-input');
  var _searchClearBtn = document.getElementById('search-clear');
  if (_searchInput) {
    _searchInput.addEventListener('input', function() {
      var val = _searchInput.value;
      if (_searchClearBtn) _searchClearBtn.style.display = val ? '' : 'none';
      clearTimeout(_searchDebounce);
      _searchDebounce = setTimeout(function() { applySearch(val); }, 140);
    });
  }

  /* Grid bottom fade — visible until user reaches the footer */
  var _gridFade = document.getElementById('grid-fade-bottom');
  if (_gridFade) _gridFade.classList.add('visible');

  /* ── Sticky bar + scroll-to-top ─────────────────────────────────────── */
  var _scrollBtn   = document.getElementById('scroll-top-btn');
  var _stickyBar   = document.getElementById('eh-sticky-bar');
  var _pageHeader  = document.getElementById('page-header');

  /* Threshold: show sticky bar once the search bar has scrolled above the viewport.
     Recalculated lazily on first scroll and reset on window resize. */
  var _stickyThreshold = 0;
  function getStickyThreshold() {
    /* Use the bottom of the search wrap — sticky appears once search is no longer visible */
    var searchWrap = document.querySelector('.eh-search-wrap');
    if (searchWrap) {
      var wrapBottom = searchWrap.getBoundingClientRect().bottom + window.scrollY;
      return Math.max(120, wrapBottom - 64); /* 64 = nav bottom */
    }
    if (_pageHeader) return Math.max(160, _pageHeader.offsetHeight - 40);
    return 200;
  }

  window.addEventListener('scroll', function() {
    var sy = window.scrollY;
    /* Scroll-to-top button */
    if (_scrollBtn) _scrollBtn.classList.toggle('visible', sy > 320);
    /* Grid fade */
    var nearBottom = (window.innerHeight + sy) >= (document.body.scrollHeight - 160);
    if (_gridFade) _gridFade.classList.toggle('visible', !nearBottom);
    /* Sticky bar — show once search bar has scrolled out of view */
    if (_stickyBar) {
      if (!_stickyThreshold) _stickyThreshold = getStickyThreshold();
      var stickyVisible = sy > _stickyThreshold;
      _stickyBar.classList.toggle('visible', stickyVisible);
      _stickyBar.setAttribute('aria-hidden', stickyVisible ? 'false' : 'true');
      /* Offset content to prevent the sticky bar obscuring grid cards */
      document.body.classList.toggle('eh-sticky-visible', stickyVisible);
    }
  }, { passive: true });

  /* Reset threshold on resize so it recalculates on next scroll */
  window.addEventListener('resize', function() {
    _stickyThreshold = 0;
  }, { passive: true });

  /* ── Sticky search proxy ─────────────────────────────────────────────── */
  /* The sticky bar has its own input that mirrors the main search field.    */
  var _stickyInput     = document.getElementById('sticky-search-input');
  var _stickySearchClear = document.getElementById('sticky-search-clear');
  var _mainInput       = document.getElementById('search-input');

  if (_stickyInput && _mainInput) {
    /* Typing in sticky input → delegates to main search logic */
    _stickyInput.addEventListener('input', function() {
      var val = _stickyInput.value;
      if (_stickySearchClear) _stickySearchClear.style.display = val ? '' : 'none';
      if (_mainInput) _mainInput.value = val;
      clearTimeout(_searchDebounce);
      _searchDebounce = setTimeout(function() { applySearch(val); }, 140);
    });
    /* Typing in main input → keep sticky in sync */
    _mainInput.addEventListener('input', function() {
      if (_stickyInput) _stickyInput.value = _mainInput.value;
      if (_stickySearchClear) _stickySearchClear.style.display = _mainInput.value ? '' : 'none';
    });
  }
})();

function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

</script>
