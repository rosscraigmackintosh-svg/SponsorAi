<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SponsorAI — Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .hub-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 40px;
      max-width: 420px;
    }

    .hub-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(12px);
      text-decoration: none;
      color: inherit;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .hub-link:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.22);
      transform: translateX(3px);
    }

    .hub-link__left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .hub-link__tag {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.10);
      padding: 3px 9px;
      border-radius: 100px;
      white-space: nowrap;
    }

    .hub-link__title {
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.70);
      letter-spacing: 0.01em;
    }

    .hub-link__arrow {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.25);
      transition: color 0.2s ease, transform 0.2s ease;
      flex-shrink: 0;
    }

    .hub-link:hover .hub-link__arrow {
      color: rgba(255, 255, 255, 0.60);
      transform: translateX(3px);
    }

    /* Hub background image */
    .bg-image--hub {
      background-image: url('images/hub.jpg');
    }

    @media (max-width: 767px) {
      .bg-image--hub {
        background-image: url('images/hub-mob.png');
      }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="bg-scene">
    <div class="bg-collage">
      <div class="sport-panel sport-panel--pitch"></div>
      <div class="sport-panel sport-panel--stadium"></div>
      <div class="sport-panel sport-panel--motor"></div>
      <div class="sport-panel sport-panel--tennis"></div>
      <div class="sport-panel sport-panel--athletics"></div>
    </div>
    <div class="bg-image bg-image--hub"></div>
    <div class="bg-overlay"></div>
    <div class="bg-vignette"></div>
    <div class="bg-noise"></div>
    <div class="light-beam light-beam--left"></div>
    <div class="light-beam light-beam--right"></div>
    <div class="light-glow light-glow--1"></div>
    <div class="light-glow light-glow--2"></div>
    <div class="light-glow light-glow--3"></div>
    <div class="pitch-lines">
      <div class="pitch-line pitch-line--h1"></div>
      <div class="pitch-line pitch-line--h2"></div>
      <div class="pitch-line pitch-line--v"></div>
      <div class="pitch-circle"></div>
    </div>
  </div>

  <!-- Page wrapper -->
  <div class="page">

    <!-- Header -->
    <header class="header">
      <a href="hub.html" class="header__logo"><img src="images/logo-whitesvg.svg" alt="SponsorAI" height="20" style="display:block;"></a>
    </header>

    <!-- Hero -->
    <main class="hero">
      <div class="hero__inner">

        <div class="hero__eyebrow">
          <span class="eyebrow-dot"></span>
          <span>Internal hub</span>
        </div>

        <h1 class="hero__headline">
          SponsorAI Hub.
        </h1>

        <p class="hero__body">
          Quick access to all SponsorAI pages.
        </p>

        <div class="hub-links">

          <a class="hub-link" href="index.html">
            <div class="hub-link__left">
              <span class="hub-link__tag">Website</span>
              <span class="hub-link__title">Coming Soon</span>
            </div>
            <span class="hub-link__arrow">→</span>
          </a>

          <a class="hub-link" href="investor-login.html">
            <div class="hub-link__left">
              <span class="hub-link__tag">Access</span>
              <span class="hub-link__title">Investor Sign In</span>
            </div>
            <span class="hub-link__arrow">→</span>
          </a>

          <a class="hub-link" href="email-welcome.html">
            <div class="hub-link__left">
              <span class="hub-link__tag">Email</span>
              <span class="hub-link__title">Welcome Email</span>
            </div>
            <span class="hub-link__arrow">→</span>
          </a>

        </div>

      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer__copy">© 2026 SponsorAI</span>
      <span class="footer__divider">·</span>
      <span class="footer__tagline">Internal use only</span>
    </footer>

  </div>

  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
