<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZCTQPS3Z5Z"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-ZCTQPS3Z5Z');
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SponsorAI — Partner Access</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="investor-login.css" />
</head>
<body>

  <!-- Background — same layers as main page -->
  <div class="bg-scene">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="bg-vignette"></div>
    <div class="bg-noise"></div>
    <div class="light-beam light-beam--left"></div>
    <div class="light-beam light-beam--right"></div>
    <div class="light-glow light-glow--1"></div>
    <div class="light-glow light-glow--2"></div>
  </div>

  <!-- Page wrapper -->
  <div class="page">

    <!-- Header -->
    <header class="header">
      <a href="index.html" class="header__logo"><img src="images/logo-white.svg" alt="SponsorAI" height="20" style="display:block;"></a>
      <a class="header__badge" href="index.html">Partner Access</a>
    </header>

    <!-- Login -->
    <main class="login-wrap">
      <div class="login-card" role="main">

        <div class="login-card__eyebrow">
          <span class="eyebrow-dot"></span>
          <span>SponsorAI Partner Access</span>
        </div>

        <h1 class="login-card__heading">Partner login</h1>
        <p class="login-card__sub">This area is for authorised partners only. Enter your credentials to access the partner portal.</p>

        <!-- Email + password form -->
        <form class="login-form" id="loginForm" novalidate autocomplete="on">

          <div class="login-field">
            <label class="login-label" for="usernameInput">Username</label>
            <input
              class="login-input"
              type="text"
              id="usernameInput"
              name="username"
              placeholder="username"
              autocomplete="username"
              spellcheck="false"
              required
            />
          </div>

          <div class="login-field">
            <label class="login-label" for="passwordInput">Password</label>
            <input
              class="login-input"
              type="password"
              id="passwordInput"
              name="password"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
          </div>

          <p class="login-error" id="loginError" aria-live="polite"></p>

          <button class="login-btn" type="submit">
            <span class="login-btn__text">Sign in</span>
            <span class="login-btn__arrow">→</span>
          </button>

        </form>

      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <span class="footer__copy">© 2026 SponsorAI Ltd</span>
      <span class="footer__divider">·</span>
      <span class="footer__tagline">Intelligence for sponsorship decisions</span>
      <span class="footer__divider">·</span>
      <span class="footer__tagline"><a href="mailto:hello@sponsorai.com?subject=SponsorAI%20%E2%80%93%20Partner%20Briefing%20Enquiry&body=Hi%20SponsorAI%20team%2C%0A%0AI%20visited%20your%20partner%20briefing%20site%20and%20would%20be%20very%20interested%20in%20having%20a%20chat%20and%20exploring%20things%20further.%0A%0ABest%2C" style="color:inherit;">hello@sponsorai.com</a></span>
    </footer>

  </div>

  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="investor-auth.js"></script>
</body>
</html>
